<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ساحة الدوافيير | Dawafeer Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
--fa:'Tajawal',sans-serif;--fe:'Outfit',sans-serif;--fm:'Outfit',sans-serif;
--bg0:#0A1929;--bg1:#0E2137;--bg2:#132C43;--bg3:#1B3A55;
--gl:rgba(14,33,55,.65);--gls:rgba(14,33,55,.82);
--bd:rgba(255,255,255,.05);--bd2:rgba(255,255,255,.09);
--t1:#F2F0FA;--t2:#A6A2B8;--t3:#6E6A80;
--nb:#5B8AFF;--nc:#00E5CC;--np:#A855F7;--nk:#EC4899;--ng:#34D399;--no:#FB923C;--nr:#F87171;
--gm:linear-gradient(135deg,var(--nb),var(--nc));
--gw:linear-gradient(135deg,var(--nk),var(--np));
--gg:linear-gradient(135deg,#FFD700,#FF8C00);--gs:linear-gradient(135deg,#C0C0C0,#708090);--gbr:linear-gradient(135deg,#CD7F32,#A0522D);
--glb:0 0 30px rgba(91,138,255,.12);--gln:0 0 50px rgba(91,138,255,.15),0 0 100px rgba(0,229,204,.05);
--r:16px;--rs:10px;--rl:24px;--rf:9999px;
--ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="light"]{
--bg0:#F3F1EC;--bg1:#FFFFFF;--bg2:#EDE9E0;--bg3:#DDD8CE;
--gl:rgba(255,255,255,.72);--gls:rgba(255,255,255,.88);
--bd:rgba(0,0,0,.05);--bd2:rgba(0,0,0,.09);
--t1:#1A1825;--t2:#5C5869;--t3:#9A96A6;
--nb:#3B6AE0;--nc:#00B8A3;--ng:#1A9960;--no:#D97706;--nr:#DC2626;
--glb:0 0 20px rgba(59,106,224,.08);--gln:0 4px 24px rgba(0,0,0,.06);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body,body *{font-feature-settings:'tnum';-moz-font-feature-settings:'tnum';-webkit-font-feature-settings:'tnum'}
.st-n,.timer-val,.ct,.rk,.sc-timer,.welcome-date,.data-note,.cst,.s-pill{font-variant-numeric:tabular-nums;unicode-bidi:plaintext;direction:ltr;display:inline-block}
html{scroll-behavior:smooth;-webkit-locale:'en'}
body{font-family:var(--fa);background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .6s var(--ease),color .4s var(--ease)}
[dir="ltr"] body,[dir="ltr"] input,[dir="ltr"] button{font-family:var(--fe)}

/* PAGE REVEAL */
.page-reveal{position:fixed;inset:0;z-index:9999;background:var(--bg0);display:flex;align-items:center;justify-content:center;transition:opacity .6s var(--ease),visibility .6s}
.page-reveal.done{opacity:0;visibility:hidden;pointer-events:none}
.reveal-logo{font-size:36px;font-weight:900;background:var(--gm);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:revealPulse 1s ease-in-out infinite alternate}
@keyframes revealPulse{0%{opacity:.4;transform:scale(.95)}100%{opacity:1;transform:scale(1)}}

/* BG */
.bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);will-change:transform}
[data-theme="light"] .orb{opacity:.04!important}
.o1{width:600px;height:600px;background:#4A90D9;opacity:.07;top:-150px;right:-150px;animation:oF 25s ease-in-out infinite}
.o2{width:500px;height:500px;background:#1B5E9E;opacity:.06;bottom:-120px;left:-120px;animation:oF 30s ease-in-out infinite reverse}
.o3{width:350px;height:350px;background:var(--nc);opacity:.04;top:40%;left:40%;animation:oF 20s ease-in-out infinite 5s}
.o4{width:200px;height:200px;background:#6C63FF;opacity:.04;top:20%;right:30%;animation:oF 22s ease-in-out infinite 10s}
@keyframes oF{0%,100%{transform:translate(0,0)scale(1)}25%{transform:translate(40px,-30px)scale(1.08)}50%{transform:translate(-30px,40px)scale(.92)}75%{transform:translate(30px,30px)scale(1.04)}}
.grid-lines{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--bd) 1px,transparent 1px),linear-gradient(90deg,var(--bd) 1px,transparent 1px);background-size:60px 60px;opacity:.3}
[data-theme="light"] .grid-lines{opacity:.15}
canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

.wrap{max-width:680px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

/* LOGO */
.logo-wrap{text-align:center;padding:36px 0 10px}
.logo-wrap a{display:inline-block;transition:transform .3s}
.logo-wrap a:hover{transform:scale(1.05)}
.logo-wrap img{width:120px;height:120px;object-fit:contain;transition:all .3s}
.logo-dark{display:inline}.logo-light{display:none}
[data-theme="light"] .logo-dark{display:none}
[data-theme="light"] .logo-light{display:inline}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:flex-end;padding:16px 0;border-bottom:1px solid var(--bd2)}
.tb-acts{display:flex;gap:6px}
.tb{width:38px;height:38px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--gl);backdrop-filter:blur(16px);color:var(--t2);font-size:14px;cursor:pointer;display:grid;place-items:center;transition:all .3s var(--ease);-webkit-tap-highlight-color:transparent}
.tb:hover{border-color:var(--nb);color:var(--nb)}
.tb:active{transform:scale(.92)}

/* STAGGER */
.stg{opacity:0;transform:translateY(24px);animation:stgIn .7s var(--ease) forwards}
@keyframes stgIn{to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{text-align:center;padding:36px 0 28px}
.hero h1{font-size:42px;font-weight:900;letter-spacing:-1px;margin-bottom:14px;background:var(--gm);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative}
[dir="ltr"] .hero h1{font-family:var(--fe)}
.hero .sub{font-size:15px;color:var(--t3);max-width:400px;margin:0 auto;line-height:1.8}
.glow-center{position:absolute;width:200px;height:200px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(91,138,255,.15),transparent 70%);filter:blur(40px);pointer-events:none;z-index:-1}

/* WELCOME BAR */
.welcome-bar{margin:16px 0 4px;padding:18px 24px;background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:var(--r);text-align:center;box-shadow:var(--glb)}
.welcome-date{font-size:14px;color:var(--t2);line-height:1.8}
.welcome-date .hij{color:var(--t1);font-weight:800;font-size:15px;margin-bottom:2px}
.data-note{text-align:center;font-size:12.5px;color:var(--t2);margin:8px 0 20px;font-weight:500}

/* LANDING GRID */
.landing-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:32px}
@media(max-width:520px){.landing-grid{grid-template-columns:1fr}}
.land-card{background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:var(--rl);padding:32px 24px;text-align:center;cursor:pointer;transition:all .4s var(--ease);position:relative;overflow:hidden}
.land-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.5;transition:opacity .3s}
.active-card::before{background:var(--gm)}
.coming-card::before{background:linear-gradient(135deg,var(--no),var(--nr))}
.active-card:hover{border-color:rgba(91,138,255,.25);transform:translateY(-4px);box-shadow:0 12px 40px rgba(91,138,255,.15)}
.coming-card{opacity:.6;cursor:default}
.land-icon{font-size:48px;margin-bottom:16px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2))}
.land-card h3{font-size:20px;font-weight:900;margin-bottom:10px}
.land-card p{font-size:13px;color:var(--t3);line-height:1.7;margin-bottom:18px}
.land-btn{display:inline-block;padding:10px 28px;background:var(--gm);color:#FFF;font-size:14px;font-weight:700;border-radius:var(--rf);transition:all .3s}
.land-soon{display:inline-block;padding:8px 22px;background:rgba(251,146,60,.1);color:var(--no);font-size:13px;font-weight:700;border-radius:var(--rf);border:1px solid rgba(251,146,60,.15)}
.arena-back{display:inline-flex;align-items:center;gap:8px;color:var(--nb);font-size:13px;font-weight:700;cursor:pointer;padding:8px 0;margin-bottom:16px;transition:all .3s}
.arena-back:hover{opacity:.7}
[dir="ltr"] .arena-back span:first-child{transform:scaleX(-1)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.st-box{background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:var(--r);padding:18px 12px;text-align:center;transition:all .3s var(--ease);position:relative;overflow:hidden;cursor:default}
.st-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--gm);opacity:.4}
.st-box:hover{border-color:rgba(91,138,255,.15);transform:translateY(-3px);box-shadow:var(--glb)}
.st-i{font-size:24px;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.st-n{font-family:var(--fm);font-size:28px;font-weight:800;color:var(--t1);transition:all .3s}
.st-l{font-size:10.5px;color:var(--t3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* FORM */
.form-w{margin-bottom:28px}
.f-card{background:var(--gls);backdrop-filter:blur(24px);border:1px solid var(--bd2);border-radius:var(--rl);padding:32px 26px;position:relative;overflow:hidden;box-shadow:var(--gln)}
.f-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gm)}
.f-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(91,138,255,.04),transparent 70%);pointer-events:none}
.f-head{text-align:center;margin-bottom:26px;position:relative}
.f-head h2{font-size:22px;font-weight:900;margin-bottom:8px}
.f-head p{font-size:13.5px;color:var(--t3);line-height:1.7}
.fld{margin-bottom:14px;position:relative}
.fl{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--t2);margin-bottom:6px}
.fi{font-size:16px}
.fin{width:100%;padding:14px 18px;background:var(--bg2);border:1.5px solid var(--bd2);border-radius:var(--rs);color:var(--t1);font-size:15px;font-family:inherit;outline:none;transition:all .35s var(--ease)}
.fin:focus{border-color:var(--nb);box-shadow:0 0 0 3px rgba(91,138,255,.12);background:var(--bg3)}
.fin::placeholder{color:var(--t3)}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.fld-row{grid-template-columns:1fr}}

.btn-go{width:100%;padding:16px;border:none;border-radius:var(--rs);background:var(--gm);color:#FFF;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .35s var(--ease);margin-top:8px;position:relative;overflow:hidden}
.btn-go::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(91,138,255,.35)}
.btn-go:hover::before{left:100%}
.btn-go:active{transform:translateY(0) scale(.98)}

/* MY SESSION */
.my-s{margin-bottom:28px;display:none}
.s-card{background:var(--gls);backdrop-filter:blur(24px);border:1.5px solid rgba(91,138,255,.25);border-radius:var(--rl);padding:36px 28px;text-align:center;position:relative;box-shadow:0 0 40px rgba(91,138,255,.1);overflow:hidden;transition:border-color .5s,box-shadow .5s}
.s-card.brk{border-color:rgba(251,146,60,.25);box-shadow:0 0 40px rgba(251,146,60,.08)}
.s-lbl{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--gm);color:#FFF;font-size:11px;font-weight:800;padding:5px 20px;border-radius:var(--rf);box-shadow:0 4px 12px rgba(91,138,255,.3)}
.s-sub{font-size:14px;color:var(--t2);margin-top:12px}

/* TIMER */
.timer-wrap{position:relative;width:200px;height:200px;margin:20px auto}
.timer-ring{position:absolute;inset:0}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bd2);stroke-width:3}
.ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease)}
.timer-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:44px;font-weight:800;letter-spacing:2px;color:var(--t1)}
.timer-phase{font-size:12px;color:var(--t3);margin-top:-8px;margin-bottom:8px}

.s-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 18px;border-radius:var(--rf);font-size:12px;font-weight:700;margin-bottom:22px;transition:all .4s var(--ease)}
.sp-s{background:rgba(52,211,153,.08);color:var(--ng);border:1px solid rgba(52,211,153,.15)}
.sp-b{background:rgba(251,146,60,.08);color:var(--no);border:1px solid rgba(251,146,60,.15)}
.sp-d{width:7px;height:7px;border-radius:50%}
.sp-s .sp-d{background:var(--ng);box-shadow:0 0 6px var(--ng);animation:pls 1.5s ease-in-out infinite}
.sp-b .sp-d{background:var(--no);box-shadow:0 0 6px var(--no);animation:pls 1.5s ease-in-out infinite}
@keyframes pls{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.s-btns{display:flex;gap:10px}
.bs{flex:1;padding:14px;border-radius:var(--rs);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .3s var(--ease);border:1.5px solid;background:transparent;-webkit-tap-highlight-color:transparent}
.bs:active{transform:scale(.95)}
.b-brk{border-color:var(--no);color:var(--no)}.b-brk:hover{background:rgba(251,146,60,.08)}
.b-rsm{border-color:var(--ng);color:var(--ng)}.b-rsm:hover{background:rgba(52,211,153,.08)}
.b-fin{border-color:var(--nr);color:var(--nr)}.b-fin:hover{background:rgba(248,113,113,.08)}

/* LEADERBOARD */
.lb{margin-bottom:48px}
.lb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.lb-top h2{font-size:20px;font-weight:900;display:flex;align-items:center;gap:10px}
.cb{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.12);border-radius:var(--rf);font-size:10.5px;font-weight:700;color:var(--ng)}
.cb.off{background:rgba(248,113,113,.06);border-color:rgba(248,113,113,.12);color:var(--nr)}
.cb .cd{width:6px;height:6px;border-radius:50%;background:var(--ng);animation:pls 2s infinite}
.cb.off .cd{background:var(--nr);animation:none}
.lb-list{display:flex;flex-direction:column;gap:8px}
.lc{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--gl);backdrop-filter:blur(14px);border:1px solid var(--bd2);border-radius:var(--r);transition:all .35s var(--ease);animation:cUp .5s var(--ease) both;position:relative;overflow:hidden;cursor:default}
@keyframes cUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.lc:hover{border-color:rgba(91,138,255,.12);transform:translateY(-2px)}
.lc.me{border-color:rgba(91,138,255,.25);background:rgba(91,138,255,.04);box-shadow:0 0 20px rgba(91,138,255,.08)}
.lc.g1{border-color:rgba(255,215,0,.2)}.lc.g2{border-color:rgba(192,192,192,.15)}.lc.g3{border-color:rgba(205,127,50,.15)}
.lc.urgent{border-color:rgba(248,113,113,.2);box-shadow:0 0 12px rgba(248,113,113,.08)}
.rk{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:15px;font-family:var(--fm);flex-shrink:0;background:var(--bg3);color:var(--t2);border:2px solid var(--bd2)}
.g1 .rk{background:var(--gg);color:#422006;border-color:rgba(255,215,0,.3);box-shadow:0 0 16px rgba(255,215,0,.2)}
.g2 .rk{background:var(--gs);color:#1e293b;border-color:rgba(192,192,192,.25)}
.g3 .rk{background:var(--gbr);color:#FFF;border-color:rgba(205,127,50,.25)}
.ci{flex:1;min-width:0}
.cn{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cr{text-align:end;flex-shrink:0}
.ct{font-family:var(--fm);font-size:17px;font-weight:800;color:var(--t1)}
.cst{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:var(--rf);margin-top:4px;text-transform:uppercase}
.ss{background:rgba(52,211,153,.08);color:var(--ng)}.sb{background:rgba(251,146,60,.08);color:var(--no)}.sf{background:rgba(248,113,113,.08);color:var(--nr)}
.sd{width:5px;height:5px;border-radius:50%;display:inline-block}
.ss .sd{background:var(--ng);animation:pls 1.4s infinite}.sb .sd{background:var(--no);animation:pls 1.4s infinite}.sf .sd{background:var(--nr)}

/* EMPTY/LOADING */
.ebox{text-align:center;padding:56px 20px;background:var(--gl);border:1px dashed var(--bd2);border-radius:var(--rl);backdrop-filter:blur(12px)}
.ebox .ei{font-size:52px;margin-bottom:14px}.ebox h3{font-size:17px;font-weight:800;color:var(--t2);margin-bottom:6px}.ebox p{font-size:13px;color:var(--t3)}
.ldbox{text-align:center;padding:44px}
.ldspin{width:32px;height:32px;border:3px solid var(--bd2);border-top-color:var(--nb);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 26px;border-radius:var(--rf);font-size:13px;font-weight:700;font-family:inherit;z-index:9999;transition:transform .5s var(--bounce);box-shadow:0 8px 32px rgba(0,0,0,.4);backdrop-filter:blur(16px);white-space:nowrap}
.toast.v{transform:translateX(-50%) translateY(0)}
.toast.ts{background:rgba(52,211,153,.9);color:#FFF}.toast.te{background:rgba(248,113,113,.9);color:#FFF}.toast.ti{background:rgba(91,138,255,.9);color:#FFF}

/* PEAK CHART */
.peak-chart{margin-bottom:28px}
.peak-card{background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.peak-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--gm);opacity:.4}
.peak-title{font-size:14px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.peak-canvas{width:100%;height:180px;display:block}

.foot{text-align:center;padding:24px;font-size:13px;color:var(--t3);font-style:italic;opacity:.6}

@media(max-width:480px){
  .hero h1{font-size:32px}
  .timer-val{font-size:34px}
  .timer-wrap{width:160px;height:160px}
  .stats{gap:6px}.st-n{font-size:20px}
  .f-card{padding:24px 20px}
  .lc{padding:13px 14px;gap:10px}
}
</style>
</head>
<body data-theme="dark">

<div class="page-reveal" id="reveal">
  <div class="reveal-logo" data-ar="ساحة الدوافيير" data-en="Dawafeer Arena"></div>
</div>

<div class="bg-scene"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div><div class="orb o4"></div></div>
<div class="grid-lines"></div>
<canvas id="particles"></canvas>

<div class="wrap">
  <div class="topbar stg" style="animation-delay:.3s">
    <div></div>
    <div class="tb-acts">
      <button class="tb" id="bL" onclick="tgL()">EN</button>
      <button class="tb" id="bT" onclick="tgT()">☀️</button>
    </div>

<script>
/* PARTICLES */
(function(){const c=document.getElementById('particles'),x=c.getContext('2d');let W,H,pts=[];function resize(){W=c.width=innerWidth;H=c.height=innerHeight;pts=[];const n=Math.min(40,Math.floor(W*H/25000));for(let i=0;i<n;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,o:Math.random()*.3+.1})}function draw(){x.clearRect(0,0,W,H);const dk=document.body.getAttribute('data-theme')!=='light';pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>W)p.dx*=-1;if(p.y<0||p.y>H)p.dy*=-1;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=dk?`rgba(91,138,255,${p.o})`:`rgba(59,106,224,${p.o*.3})`;x.fill()});requestAnimationFrame(draw)}resize();draw();addEventListener('resize',resize)})();

/* CONFIG */
const SU='https://jthfqynavqpzvkgwznzy.supabase.co',SK='sb_publishable_uI_kw2bzlXrAG6qf6jgvkA_I8bjZsBL',TB='study_sessions';
const sb=window.supabase.createClient(SU,SK);
let lang=localStorage.getItem('sa_l')||'ar',theme=localStorage.getItem('sa_t')||'dark',uid=localStorage.getItem('sa_u'),mid=localStorage.getItem('sa_m'),R=[],tick;

const L={studying:{ar:'يذاكر',en:'Studying'},on_break:{ar:'بريك',en:'Break'},finished:{ar:'أنهى',en:'Done'},started:{ar:'بدأت جلستك! 🔥',en:'Started! 🔥'},resumed:{ar:'أكمل! 💪',en:'Resumed! 💪'},broke:{ar:'بريك ☕',en:'Break ☕'},ended:{ar:'أحسنت! ✅',en:'Done! ✅'},fill:{ar:'أدخل اسمك والمادة',en:'Enter name & subject'}};
const t=k=>L[k]?.[lang]||k;
function mkid(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&3|8)).toString(16)})}
function ni(){return new Date().toISOString()}
function td(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Riyadh'})).toISOString().split('T')[0]}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* COUNTDOWN: compute remaining from ends_at */
function rem(s){
  if(s.status==='finished'||!s.ends_at) return 0;
  return Math.max(0,Math.floor((new Date(s.ends_at).getTime()-Date.now())/1000));
}
function fmtT(sec){
  if(sec<=0)return'00:00';
  const m=Math.floor(sec/60),s=sec%60;
  return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* DATES */
function updD(){
  const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Riyadh'}));
  const lo=lang==='ar'?'ar-SA-u-nu-latn':'en-US';
  const o={weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Riyadh',numberingSystem:'latn'};
  try{document.getElementById('hd').textContent=n.toLocaleDateString(lo,{...o,calendar:'islamic-umalqura'})}catch(e){document.getElementById('hd').textContent=''}
  document.getElementById('gd').textContent=n.toLocaleDateString(lo,{...o,calendar:'gregory'});
}

/* THEME/LANG */
function aT(){document.body.setAttribute('data-theme',theme);document.getElementById('bT').textContent=theme==='dark'?'☀️':'🌙';localStorage.setItem('sa_t',theme)}
function tgT(){theme=theme==='dark'?'light':'dark';aT()}
function aL(){
  const a=lang==='ar';document.documentElement.lang=lang;document.documentElement.dir=a?'rtl':'ltr';
  document.getElementById('bL').textContent=a?'EN':'عربي';localStorage.setItem('sa_l',lang);
  document.querySelectorAll('[data-ar]').forEach(e=>{e.textContent=a?e.dataset.ar:e.dataset.en});
  document.querySelectorAll('[data-pa]').forEach(e=>{e.placeholder=a?e.dataset.pa:e.dataset.pe});
  updD();rLB();
}
function tgL(){lang=lang==='ar'?'en':'ar';aL()}
function toast(m,c='ti'){const e=document.getElementById('tst');e.textContent=m;e.className=`toast ${c} v`;setTimeout(()=>e.classList.remove('v'),3000)}

/* RING PROGRESS */
function updRing(remSec,totalSec){
  const pct=totalSec>0?Math.min(remSec/totalSec,1):0;
  const circ=565.48,off=circ-(pct*circ);
  const fg=document.getElementById('ringFg');if(fg)fg.style.strokeDashoffset=off;
}

/* SESSION ACTIONS */
async function go(){
  const name=document.getElementById('iN').value.trim(),subj=document.getElementById('iS').value.trim();
  const studyMin=parseInt(document.getElementById('iStudyMin').value)||25;
  const breakMin=5;
  if(!name||!subj){toast(t('fill'),'te');return}
  if(!uid){uid=mkid();localStorage.setItem('sa_u',uid)}
  const now=new Date();const durSec=studyMin*60;
  const endsAt=new Date(now.getTime()+durSec*1000).toISOString();
  const{data,error}=await sb.from(TB).insert({
    session_uuid:uid,name,subject:subj,status:'studying',
    study_duration_minutes:studyMin,break_duration_minutes:breakMin,
    remaining_seconds:durSec,current_phase:'study',
    phase_started_at:now.toISOString(),ends_at:endsAt,
    started_at:now.toISOString(),last_resumed_at:now.toISOString(),
    total_study_seconds:0,created_date:td()
  }).select().single();
  if(error){toast('Error','te');return}
  mid=data.id;localStorage.setItem('sa_m',mid);showMe(data);toast(t('started'),'ts');
}

function showBreakInput(){
  const a=lang==='ar';
  const b=document.getElementById('mBt');
  b.innerHTML=`<div style="width:100%;display:flex;gap:8px;align-items:center">
    <input class="fin" id="brkMinInput" type="number" value="5" min="1" max="120" style="width:80px;padding:10px;text-align:center">
    <span style="font-size:12px;color:var(--t3)">${a?'دقيقة':'min'}</span>
    <button class="bs b-brk" onclick="doBrkWithTime()" style="flex:1">${a?'☕ ابدأ البريك':'☕ Start Break'}</button>
    <button class="bs b-fin" onclick="updMyUI(R.find(r=>r.id===mid))" style="flex:0;padding:10px 14px">${a?'رجوع':'Back'}</button>
  </div>`;
}

async function doBrkWithTime(){
  const me=R.find(r=>r.id===mid);if(!me)return;
  const brkMin=parseInt(document.getElementById('brkMinInput').value)||5;
  const now=new Date();const dur=brkMin*60;
  await sb.from(TB).update({
    status:'break',current_phase:'break',remaining_seconds:dur,
    break_duration_minutes:brkMin,
    phase_started_at:now.toISOString(),ends_at:new Date(now.getTime()+dur*1000).toISOString(),last_resumed_at:null
  }).eq('id',mid);toast(t('broke'),'ti');
}

async function doBrk(){
  const me=R.find(r=>r.id===mid);if(!me)return;
  const now=new Date();const dur=(me.break_duration_minutes||5)*60;
  await sb.from(TB).update({
    status:'break',current_phase:'break',remaining_seconds:dur,
    phase_started_at:now.toISOString(),ends_at:new Date(now.getTime()+dur*1000).toISOString(),last_resumed_at:null
  }).eq('id',mid);toast(t('broke'),'ti');
}

async function doRsm(){
  const me=R.find(r=>r.id===mid);if(!me)return;
  const now=new Date();const dur=(me.study_duration_minutes||25)*60;
  await sb.from(TB).update({
    status:'studying',current_phase:'study',remaining_seconds:dur,
    phase_started_at:now.toISOString(),ends_at:new Date(now.getTime()+dur*1000).toISOString(),last_resumed_at:now.toISOString()
  }).eq('id',mid);toast(t('resumed'),'ts');
}

async function doFin(){
  await sb.from(TB).update({status:'finished',remaining_seconds:0,ends_at:null,last_resumed_at:null}).eq('id',mid);
  localStorage.removeItem('sa_m');mid=null;
  document.getElementById('myS').style.display='none';document.getElementById('fW').style.display='block';
  toast(t('ended'),'ts');
}

function showMe(d){document.getElementById('fW').style.display='none';document.getElementById('myS').style.display='block';document.getElementById('mSub').textContent=d.subject;updMyUI(d)}
function updMyUI(d){
  if(!d)return;const p=document.getElementById('mPl'),tx=document.getElementById('mPT'),b=document.getElementById('mBt'),a=lang==='ar',sc=document.getElementById('sCard'),ph=document.getElementById('mPhase');
  p.className='s-pill';sc.classList.remove('brk');
  if(d.status==='studying'){
    p.classList.add('sp-s');tx.textContent=t('studying');
    ph.textContent=a?'مذاكرة':'Studying';
    b.innerHTML=`<button class="bs b-brk" onclick="showBreakInput()">${a?'☕ بريك':'☕ Break'}</button><button class="bs b-fin" onclick="doFin()">${a?'✅ إنهاء':'✅ Finish'}</button>`;
  }else if(d.status==='break'){
    p.classList.add('sp-b');tx.textContent=t('on_break');sc.classList.add('brk');
    ph.textContent=a?'بريك':'Break';
    b.innerHTML=`<button class="bs b-rsm" onclick="doRsm()">${a?'📖 أكمل':'📖 Resume'}</button><button class="bs b-fin" onclick="doFin()">${a?'✅ إنهاء':'✅ Finish'}</button>`;
  }
}

/* STATS */
function updStats(){
  const studying=R.filter(r=>r.status==='studying').length;
  let totalSec=0;
  R.forEach(r=>{
    if(r.status==='finished') totalSec+=(r.total_study_seconds||(r.study_duration_minutes||25)*60);
    else if(r.current_phase==='study'&&r.ends_at) totalSec+=Math.max(0,(r.study_duration_minutes||25)*60-rem(r));
    else totalSec+=(r.total_study_seconds||0);
  });
  // Also add ALL sessions data for total
  const h=Math.floor(totalSec/3600),m=Math.floor((totalSec%3600)/60);
  document.getElementById('sA').textContent=studying;
  document.getElementById('sTotalH').textContent=h>0?`${h}h ${m}m`:`${m}m`;
}

/* Calculate actual study seconds for a session */
function actualStudySec(s){
  if(s.status==='finished') return s.total_study_seconds||(s.study_duration_minutes||25)*60;
  if(s.current_phase==='study'&&s.ends_at) return Math.max(0,(s.study_duration_minutes||25)*60-rem(s));
  return s.total_study_seconds||0;
}

function fmtHM(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h>0?`${h}h ${m}m`:`${m}m`}

/* LEADERBOARD 1: Active Sessions */
function rLB(){
  const bx=document.getElementById('lB'),el=document.getElementById('ld');if(el)el.remove();
  const active=R.filter(s=>s.status!=='finished').sort((a,b)=>rem(a)-rem(b));
  if(!active.length){bx.innerHTML=`<div class="ebox" style="padding:32px"><div class="ei" style="font-size:36px">⚡</div><h3>${lang==='ar'?'لا توجد جلسات نشطة':'No active sessions'}</h3><p>${lang==='ar'?'كن أول من يبدأ المذاكرة!':'Be the first to start!'}</p></div>`;rHall();return}
  let h='<div class="lb-list">';
  active.forEach((s,i)=>{
    const rk=i+1,isme=s.id===mid,r=rem(s);
    const stc=s.status==='studying'?'ss':'sb';
    const stk=s.status==='studying'?'studying':'on_break';
    const rc=rk===1?'g1':rk===2?'g2':rk===3?'g3':'';
    const bg=rk===1?'🥇':rk===2?'🥈':rk===3?'🥉':rk;
    const urgent=r>0&&r<60?'urgent':'';
    const phase=s.current_phase==='study'?(lang==='ar'?'مذاكرة':'Study'):(lang==='ar'?'بريك':'Break');
    h+=`<div class="lc ${rc} ${isme?'me':''} ${urgent}" data-id="${s.id}" style="animation-delay:${i*.04}s">
      <div class="rk">${bg}</div>
      <div class="ci"><div class="cn">${esc(s.name)}${isme?(lang==='ar'?' (أنت)':' (You)'):''}</div><div class="cs">${esc(s.subject)} · ${phase}</div></div>
      <div class="cr"><div class="ct" data-sid="${s.id}">${fmtT(r)}</div><div class="cst ${stc}"><span class="sd"></span>${t(stk)}</div></div>
    </div>`;
  });
  h+='</div>';bx.innerHTML=h;
  rHall();
}

/* LEADERBOARD 2: Hall of Fame - grouped by name, sorted by total study time */
function rHall(){
  const bx=document.getElementById('lBHall');if(!bx)return;
  // Group all sessions by name and sum study time
  const map={};
  R.forEach(s=>{
    const key=s.name.trim().toLowerCase();
    if(!map[key]) map[key]={name:s.name,totalSec:0,sessions:0};
    map[key].totalSec+=actualStudySec(s);
    map[key].sessions++;
  });
  const leaders=Object.values(map).sort((a,b)=>b.totalSec-a.totalSec);
  if(!leaders.length){bx.innerHTML=`<div class="ebox" style="padding:32px"><div class="ei" style="font-size:36px">🏆</div><h3>${lang==='ar'?'لا يوجد بيانات بعد':'No data yet'}</h3></div>`;return}

  let h='<div class="lb-list">';
  leaders.forEach((p,i)=>{
    const rk=i+1;
    const rc=rk===1?'g1':rk===2?'g2':rk===3?'g3':'';
    const bg=rk===1?'🥇':rk===2?'🥈':rk===3?'🥉':rk;
    const sessLabel=lang==='ar'?`${p.sessions} جلسة`:`${p.sessions} sessions`;
    h+=`<div class="lc ${rc}" style="animation-delay:${i*.04}s">
      <div class="rk">${bg}</div>
      <div class="ci"><div class="cn">${esc(p.name)}</div><div class="cs">${sessLabel}</div></div>
      <div class="cr"><div class="ct" style="font-size:18px">${fmtHM(p.totalSec)}</div><div style="font-size:9px;color:var(--t3);margin-top:2px">${lang==='ar'?'إجمالي':'Total'}</div></div>
    </div>`;
  });
  h+='</div>';bx.innerHTML=h;
}

/* TICK */
function startTick(){if(tick)clearInterval(tick);tick=setInterval(async()=>{
  // Auto-finish: if MY session timer reached zero
  if(mid){
    const me=R.find(r=>r.id===mid);
    if(me&&me.status!=='finished'){
      const r=rem(me);
      document.getElementById('mTim').textContent=fmtT(r);
      const totalDur=me.current_phase==='study'?(me.study_duration_minutes||25)*60:(me.break_duration_minutes||5)*60;
      updRing(r,totalDur);
      // AUTO FINISH when timer hits zero
      if(r<=0&&me.ends_at){
        const studySec=me.current_phase==='study'?(me.study_duration_minutes||25)*60:0;
        const prevTotal=me.total_study_seconds||0;
        await sb.from(TB).update({
          status:'finished',remaining_seconds:0,ends_at:null,last_resumed_at:null,
          total_study_seconds:prevTotal+studySec
        }).eq('id',mid);
        localStorage.removeItem('sa_m');mid=null;
        document.getElementById('myS').style.display='none';document.getElementById('fW').style.display='block';
        toast(lang==='ar'?'انتهى الوقت! أحسنت ✅':'Time is up! Well done ✅','ts');
        await load();return;
      }
    }
  }
  document.querySelectorAll('.ct[data-sid]').forEach(el=>{
    const s=R.find(r=>r.id===el.dataset.sid);
    if(s)el.textContent=fmtT(rem(s));
  });
  updStats();
},1000)}

/* LOAD */
let allSessions=[];

async function load(){
  const{data}=await sb.from(TB).select('*').eq('created_date',td()).order('started_at',{ascending:true});
  R=data||[];rLB();updStats();
  if(mid){const me=R.find(r=>r.id===mid);if(me&&me.status!=='finished')showMe(me);else{localStorage.removeItem('sa_m');mid=null}}
  // Load ALL sessions for chart (all dates)
  const{data:allData}=await sb.from(TB).select('started_at');
  allSessions=allData||[];
  drawPeakChart();
}

/* PEAK HOURS CHART — Canvas API */
function drawPeakChart(){
  const canvas=document.getElementById('peakCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  ctx.clearRect(0,0,W,H);

  // Aggregate sessions by hour (0-23)
  const hours=new Array(24).fill(0);
  allSessions.forEach(s=>{
    if(s.started_at){
      const h=new Date(s.started_at).getHours();
      hours[h]++;
    }
  });

  const maxVal=Math.max(...hours,1);
  const padL=36,padR=12,padT=12,padB=28;
  const chartW=W-padL-padR,chartH=H-padT-padB;
  const isDark=document.body.getAttribute('data-theme')!=='light';

  // Grid lines
  ctx.strokeStyle=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
  ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=padT+chartH-(chartH/4)*i;
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
  }

  // Y-axis labels
  ctx.fillStyle=isDark?'rgba(255,255,255,.3)':'rgba(0,0,0,.3)';
  ctx.font='10px Outfit,sans-serif';
  ctx.textAlign='right';
  for(let i=0;i<=4;i++){
    const y=padT+chartH-(chartH/4)*i;
    const val=Math.round((maxVal/4)*i);
    ctx.fillText(val,padL-6,y+3);
  }

  // X-axis labels (12-hour format)
  ctx.textAlign='center';
  const isAr=lang==='ar';
  for(let h=0;h<24;h+=3){
    const x=padL+(chartW/23)*h;
    const h12=h===0?12:h>12?h-12:h;
    const ampm=h<12?(isAr?'ص':'AM'):(isAr?'م':'PM');
    ctx.fillText(h12+ampm,x,H-6);
  }

  // Area fill
  const grad=ctx.createLinearGradient(0,padT,0,padT+chartH);
  if(isDark){
    grad.addColorStop(0,'rgba(91,138,255,.25)');
    grad.addColorStop(1,'rgba(91,138,255,.02)');
  }else{
    grad.addColorStop(0,'rgba(59,106,224,.2)');
    grad.addColorStop(1,'rgba(59,106,224,.01)');
  }

  ctx.beginPath();
  ctx.moveTo(padL,padT+chartH);
  for(let h=0;h<24;h++){
    const x=padL+(chartW/23)*h;
    const y=padT+chartH-(hours[h]/maxVal)*chartH;
    if(h===0)ctx.lineTo(x,y);
    else{
      // Smooth curve
      const prevX=padL+(chartW/23)*(h-1);
      const prevY=padT+chartH-(hours[h-1]/maxVal)*chartH;
      const cpx=(prevX+x)/2;
      ctx.bezierCurveTo(cpx,prevY,cpx,y,x,y);
    }
  }
  ctx.lineTo(padL+(chartW/23)*23,padT+chartH);
  ctx.closePath();
  ctx.fillStyle=grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  for(let h=0;h<24;h++){
    const x=padL+(chartW/23)*h;
    const y=padT+chartH-(hours[h]/maxVal)*chartH;
    if(h===0)ctx.moveTo(x,y);
    else{
      const prevX=padL+(chartW/23)*(h-1);
      const prevY=padT+chartH-(hours[h-1]/maxVal)*chartH;
      const cpx=(prevX+x)/2;
      ctx.bezierCurveTo(cpx,prevY,cpx,y,x,y);
    }
  }
  ctx.strokeStyle=isDark?'rgba(91,138,255,.8)':'rgba(59,106,224,.7)';
  ctx.lineWidth=2;
  ctx.stroke();

  // Dots on peaks
  const threshold=maxVal*0.5;
  for(let h=0;h<24;h++){
    if(hours[h]>=threshold&&hours[h]>0){
      const x=padL+(chartW/23)*h;
      const y=padT+chartH-(hours[h]/maxVal)*chartH;
      ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
      ctx.fillStyle=isDark?'rgba(91,138,255,1)':'rgba(59,106,224,1)';
      ctx.fill();
      ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);
      ctx.fillStyle=isDark?'rgba(91,138,255,.15)':'rgba(59,106,224,.1)';
      ctx.fill();
    }
  }
}

// Redraw chart on theme change
const origTgT=tgT;
tgT=function(){origTgT();setTimeout(drawPeakChart,100)};
window.addEventListener('resize',()=>setTimeout(drawPeakChart,200));

/* REALTIME */
function sub(){
  sb.channel('arena').on('postgres_changes',{event:'*',schema:'public',table:TB,filter:`created_date=eq.${td()}`},()=>load())
  .subscribe(st=>{
    const b=document.getElementById('cB'),l=document.getElementById('cL');
    if(st==='SUBSCRIBED'){b.classList.remove('off');l.textContent=lang==='ar'?'متصل':'Connected'}
    else if(st==='CLOSED'||st==='CHANNEL_ERROR'){b.classList.add('off');l.textContent=lang==='ar'?'غير متصل':'Disconnected'}
  });
}

/* LANDING NAV */
function enterArena(){
  document.getElementById('landingGrid').style.display='none';
  document.getElementById('arenaContent').style.display='block';
  history.pushState({page:'arena'},'','#arena');
  document.querySelectorAll('#arenaContent .stg').forEach((el,i)=>{el.style.animationDelay=(i*.1+.2)+'s';el.classList.remove('stg');void el.offsetWidth;el.classList.add('stg')});
}
function backToLanding(){
  document.getElementById('arenaContent').style.display='none';
  document.getElementById('landingGrid').style.display='grid';
  history.pushState({page:'home'},'','#');
}
window.addEventListener('popstate',function(e){
  if(e.state&&e.state.page==='arena'){document.getElementById('landingGrid').style.display='none';document.getElementById('arenaContent').style.display='block'}
  else{document.getElementById('arenaContent').style.display='none';document.getElementById('landingGrid').style.display='grid'}
});
if(window.location.hash==='#arena'){document.getElementById('landingGrid').style.display='none';document.getElementById('arenaContent').style.display='block'}

/* INIT */
async function init(){
  if(!uid){uid=mkid();localStorage.setItem('sa_u',uid)}
  aT();aL();await load();sub();startTick();setInterval(updD,60000);
  setTimeout(()=>document.getElementById('reveal').classList.add('done'),1200);
}
init();
</script>
