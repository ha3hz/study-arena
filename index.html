<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ساحة المذاكرة | Study Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-ar: 'Tajawal', sans-serif;
  --font-en: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --bg-body: #F7F5F0;
  --bg-card: #FFFFFF;
  --bg-card-alt: #F0EDE6;
  --bg-input: #F0EDE6;
  --border: #E0DCD4;
  --border-strong: #C8C2B6;
  --text-1: #1B1B1F;
  --text-2: #5C5A57;
  --text-3: #9A9690;
  --accent: #2D5BFF;
  --accent-soft: #EBF0FF;
  --accent-glow: rgba(45,91,255,0.12);
  --green: #1DB954;
  --green-soft: #E8F8EE;
  --orange: #E8820E;
  --orange-soft: #FFF3E0;
  --red: #E53935;
  --red-soft: #FEECEB;
  --gold: #D4A017;
  --silver: #8A8D93;
  --bronze: #B87333;
  --shadow-1: 0 1px 2px rgba(27,27,31,0.04);
  --shadow-2: 0 4px 16px rgba(27,27,31,0.06);
  --shadow-3: 0 12px 40px rgba(27,27,31,0.08);
  --shadow-glow: 0 0 0 1px var(--accent), 0 0 20px var(--accent-glow);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
  --radius-full: 9999px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg-body: #111114;
  --bg-card: #1A1A1F;
  --bg-card-alt: #222228;
  --bg-input: #222228;
  --border: #2A2A30;
  --border-strong: #3A3A42;
  --text-1: #F2F0ED;
  --text-2: #A3A09B;
  --text-3: #6B6860;
  --accent: #5B8AFF;
  --accent-soft: #1A2340;
  --accent-glow: rgba(91,138,255,0.2);
  --green: #2EE06C;
  --green-soft: #132B1A;
  --orange: #FFB443;
  --orange-soft: #2B2010;
  --red: #FF6B6B;
  --red-soft: #2B1515;
  --shadow-1: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-2: 0 4px 16px rgba(0,0,0,0.25);
  --shadow-3: 0 12px 40px rgba(0,0,0,0.35);
  --shadow-glow: 0 0 0 1px var(--accent), 0 0 24px var(--accent-glow);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-ar);background:var(--bg-body);color:var(--text-1);min-height:100vh;line-height:1.6;transition:background var(--transition),color var(--transition);-webkit-font-smoothing:antialiased}
[dir="ltr"] body,[dir="ltr"] .input-field,[dir="ltr"] .btn{font-family:var(--font-en)}
body::before{content:'';position:fixed;inset:0;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.container{max-width:720px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.date-col{font-size:12.5px;color:var(--text-3);line-height:1.7}
.date-col .hijri-line{color:var(--text-2);font-weight:700;font-size:13px}
.topbar-actions{display:flex;gap:6px}
.topbar-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-2);font-size:15px;cursor:pointer;display:grid;place-items:center;transition:all var(--transition)}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent)}

/* HERO */
.hero{text-align:center;padding:36px 0 28px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;border-radius:var(--radius-full);margin-bottom:16px;letter-spacing:.5px}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-size:32px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px}
.hero .subtitle{font-size:15px;color:var(--text-3);max-width:380px;margin:0 auto}

/* STATS */
.live-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center;box-shadow:var(--shadow-1);transition:all var(--transition)}
.stat-card:hover{box-shadow:var(--shadow-2);transform:translateY(-1px)}
.stat-emoji{font-size:20px;margin-bottom:4px}
.stat-number{font-family:var(--font-mono);font-size:22px;font-weight:700;line-height:1.2}
.stat-label{font-size:11px;color:var(--text-3);font-weight:500;margin-top:2px}

/* FORM */
.form-section{margin-bottom:28px}
.form-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 24px;box-shadow:var(--shadow-2);position:relative;overflow:hidden}
.form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--green))}
.form-header{text-align:center;margin-bottom:24px}
.form-header h2{font-size:20px;font-weight:800;margin-bottom:6px}
.form-header p{font-size:13px;color:var(--text-3)}
.field{margin-bottom:16px}
.field-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:7px}
.label-icon{font-size:15px}
.input-field{width:100%;padding:13px 16px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-1);font-size:15px;font-family:inherit;outline:none;transition:all var(--transition)}
.input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:var(--bg-card)}
.input-field::placeholder{color:var(--text-3)}
.btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-start{background:var(--accent);color:#FFF;margin-top:4px}
.btn-start:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:var(--shadow-glow)}
.btn-start:active{transform:translateY(0)}

/* MY SESSION */
.my-session{margin-bottom:28px;display:none}
.session-card{background:var(--bg-card);border:2px solid var(--accent);border-radius:var(--radius-lg);padding:28px 24px;text-align:center;box-shadow:var(--shadow-glow);position:relative}
.my-label{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--accent);color:#FFF;font-size:11px;font-weight:700;padding:3px 14px;border-radius:var(--radius-full)}
.session-studying{font-size:14px;color:var(--text-2);margin-top:8px}
.session-timer-display{font-family:var(--font-mono);font-size:48px;font-weight:700;letter-spacing:3px;margin:14px 0;direction:ltr}
.session-status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 16px;border-radius:var(--radius-full);font-size:13px;font-weight:600;margin-bottom:22px}
.pill-studying{background:var(--green-soft);color:var(--green)}
.pill-break{background:var(--orange-soft);color:var(--orange)}
.pill-finished{background:var(--red-soft);color:var(--red)}
.pill-dot{width:7px;height:7px;border-radius:50%}
.pill-studying .pill-dot{background:var(--green);animation:blink 1.4s infinite}
.pill-break .pill-dot{background:var(--orange);animation:blink 1.4s infinite}
.session-btns{display:flex;gap:10px}
.btn-session{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all var(--transition);border:1.5px solid;background:transparent}
.btn-break-action{border-color:var(--orange);color:var(--orange)}
.btn-break-action:hover{background:var(--orange-soft)}
.btn-resume-action{border-color:var(--green);color:var(--green)}
.btn-resume-action:hover{background:var(--green-soft)}
.btn-finish-action{border-color:var(--red);color:var(--red)}
.btn-finish-action:hover{background:var(--red-soft)}

/* LEADERBOARD */
.leaderboard{margin-bottom:48px}
.lb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.lb-header h2{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
.sync-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--green-soft);color:var(--green);font-size:11px;font-weight:600;border-radius:var(--radius-full)}
.sync-badge.offline{background:var(--red-soft);color:var(--red)}
.sync-badge .s-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
.sync-badge.offline .s-dot{background:var(--red);animation:none}
.lb-list{display:flex;flex-direction:column;gap:8px}
.comp-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-1);transition:all .3s ease;animation:cardIn .35s ease-out both}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.comp-card.is-mine{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 1px var(--accent),var(--shadow-2)}
.comp-card.top-1{border-color:var(--gold)}
.comp-card.top-2{border-color:var(--silver)}
.comp-card.top-3{border-color:var(--bronze)}
.comp-rank{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:14px;font-family:var(--font-mono);flex-shrink:0;background:var(--bg-card-alt);color:var(--text-2);border:2px solid var(--border)}
.top-1 .comp-rank{background:linear-gradient(135deg,#FFE082,#FFB300);color:#5D4037;border-color:var(--gold)}
.top-2 .comp-rank{background:linear-gradient(135deg,#E0E0E0,#9E9E9E);color:#37474F;border-color:var(--silver)}
.top-3 .comp-rank{background:linear-gradient(135deg,#FFCC80,#E65100);color:#FFF;border-color:var(--bronze)}
.comp-info{flex:1;min-width:0}
.comp-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-subject{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.comp-right{text-align:end;flex-shrink:0}
.comp-time{font-family:var(--font-mono);font-size:16px;font-weight:700;direction:ltr;display:inline-block}
.comp-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);margin-top:4px}
.c-studying{background:var(--green-soft);color:var(--green)}
.c-break{background:var(--orange-soft);color:var(--orange)}
.c-finished{background:var(--red-soft);color:var(--red)}
.c-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.c-studying .c-dot{background:var(--green);animation:blink 1.4s infinite}
.c-break .c-dot{background:var(--orange);animation:blink 1.4s infinite}
.c-finished .c-dot{background:var(--red)}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:52px 20px;background:var(--bg-card);border:1px dashed var(--border-strong);border-radius:var(--radius-lg)}
.empty-state .empty-icon{font-size:44px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:700;color:var(--text-2);margin-bottom:4px}
.empty-state p{font-size:13px;color:var(--text-3)}
.loading-state{text-align:center;padding:40px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 22px;border-radius:var(--radius-full);font-size:13px;font-weight:600;font-family:inherit;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow-3);white-space:nowrap}
.toast.visible{transform:translateX(-50%) translateY(0)}
.toast.t-success{background:var(--green);color:#FFF}
.toast.t-error{background:var(--red);color:#FFF}
.toast.t-info{background:var(--accent);color:#FFF}

.motivation{text-align:center;padding:20px;font-size:13px;color:var(--text-3);font-style:italic}

@media(max-width:480px){
  .hero h1{font-size:26px}
  .session-timer-display{font-size:38px}
  .live-stats{gap:6px}
  .stat-number{font-size:18px}
  .form-card{padding:22px 18px}
  .comp-card{padding:12px;gap:10px}
}
</style>
</head>
<body data-theme="light">
<div class="container">
  <div class="topbar">
    <div class="date-col">
      <div class="hijri-line" id="hijriDate"></div>
      <div id="gregDate"></div>
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn" id="btnLang" onclick="toggleLang()">EN</button>
      <button class="topbar-btn" id="btnTheme" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
  <div class="hero">
    <div class="hero-badge"><span class="dot"></span><span data-ar="بث مباشر" data-en="LIVE"></span></div>
    <h1 data-ar="ساحة المذاكرة" data-en="Study Arena"></h1>
    <p class="subtitle" data-ar="ذاكر مع زملائك وتنافسوا مع بعض.. كل دقيقة تفرق!" data-en="Study with your peers and compete — every minute counts!"></p>
  </div>
  <div class="live-stats">
    <div class="stat-card"><div class="stat-emoji">📖</div><div class="stat-number" id="statActive">0</div><div class="stat-label" data-ar="يذاكرون الآن" data-en="Studying Now"></div></div>
    <div class="stat-card"><div class="stat-emoji">⏱️</div><div class="stat-number" id="statTotal">0:00</div><div class="stat-label" data-ar="إجمالي اليوم" data-en="Today Total"></div></div>
    <div class="stat-card"><div class="stat-emoji">👥</div><div class="stat-number" id="statCount">0</div><div class="stat-label" data-ar="مشارك" data-en="Joined"></div></div>
  </div>
  <div class="form-section" id="formSection">
    <div class="form-card">
      <div class="form-header">
        <h2 data-ar="ابدأ جلسة مذاكرة" data-en="Start a Study Session"></h2>
        <p data-ar="اكتب اسمك والمادة اللي بتذاكرها وابدأ التحدي 🔥" data-en="Enter your name, what you're studying, and start the challenge 🔥"></p>
      </div>
      <div class="field">
        <label class="field-label"><span class="label-icon">👤</span><span data-ar="اسمك" data-en="Your Name"></span></label>
        <input class="input-field" id="inputName" maxlength="30" data-ph-ar="مثال: حمدان" data-ph-en="e.g. Hamdan">
      </div>
      <div class="field">
        <label class="field-label"><span class="label-icon">📚</span><span data-ar="إيش بتذاكر؟" data-en="What are you studying?"></span></label>
        <input class="input-field" id="inputSubject" maxlength="50" data-ph-ar="مثال: الرياضيات - الفصل الثالث" data-ph-en="e.g. Math — Chapter 3">
      </div>
      <button class="btn btn-start" id="btnStart" onclick="startSession()"><span data-ar="🚀 ابدأ المذاكرة" data-en="🚀 Start Studying"></span></button>
    </div>
  </div>
  <div class="my-session" id="mySession">
    <div class="session-card">
      <div class="my-label" data-ar="جلستي" data-en="My Session"></div>
      <div class="session-studying" id="mySubject"></div>
      <div class="session-timer-display" id="myTimer">00:00:00</div>
      <div class="session-status-pill pill-studying" id="myPill"><span class="pill-dot"></span><span id="myPillText" data-ar="يذاكر الآن" data-en="Studying"></span></div>
      <div class="session-btns" id="myBtns"></div>
    </div>
  </div>
  <div class="leaderboard">
    <div class="lb-header">
      <h2><span>🏆</span><span data-ar="لوحة المنافسين" data-en="Leaderboard"></span></h2>
      <div class="sync-badge" id="syncBadge"><span class="s-dot"></span><span id="syncLabel" data-ar="متصل" data-en="Connected"></span></div>
    </div>
    <div id="lbContent">
      <div class="loading-state" id="loader"><div class="spinner"></div><div style="font-size:13px;color:var(--text-3)" data-ar="جاري التحميل..." data-en="Loading..."></div></div>
    </div>
  </div>
  <div class="motivation" data-ar="« العلم نور، والجهل ظلام »" data-en="« Knowledge is light, ignorance is darkness »"></div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPA_URL='https://jthfqynavqpzvkgwznzy.supabase.co';
const SUPA_KEY='sb_publishable_uI_kw2bzlXrAG6qf6jgvkA_I8bjZsBL';
const TABLE='study_sessions';
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);

let lang=localStorage.getItem('sa_lang')||'ar';
let theme=localStorage.getItem('sa_theme')||'light';
let sessUUID=localStorage.getItem('sa_uuid');
let myId=localStorage.getItem('sa_active');
let rows=[];
let tickId=null;

const L={
  studying:{ar:'يذاكر الآن',en:'Studying'},
  on_break:{ar:'في بريك',en:'On Break'},
  finished:{ar:'أنهى',en:'Finished'},
  started:{ar:'بدأت جلستك! بالتوفيق 🔥',en:'Session started! Good luck 🔥'},
  resumed:{ar:'أكمل مذاكرتك! 💪',en:'Back to studying! 💪'},
  broke:{ar:'استمتع ببريكك ☕',en:'Enjoy your break ☕'},
  ended:{ar:'أحسنت! جلسة رائعة ✅',en:'Well done! Great session ✅'},
  fill:{ar:'أدخل اسمك والمادة',en:'Enter name and subject'},
};
const t=k=>L[k]?.[lang]||k;

function uuid(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)})}
function nowISO(){return new Date().toISOString()}
function todayStr(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Riyadh'})).toISOString().split('T')[0]}
function liveSec(s){let t=s.total_study_seconds||0;if(s.status==='studying'&&s.last_resumed_at){t+=Math.max(0,Math.floor((Date.now()-new Date(s.last_resumed_at).getTime())/1000))}return t}
function fmt(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=Math.floor(sec%60);return h>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function fmtHM(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h>0?`${h}h ${m}m`:`${m}m`}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function updateDates(){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Riyadh'}));
  const loc=lang==='ar'?'ar-SA':'en-US';
  const opts={weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Riyadh'};
  try{document.getElementById('hijriDate').textContent=now.toLocaleDateString(loc,{...opts,calendar:'islamic-umalqura'})}catch(e){document.getElementById('hijriDate').textContent=now.toLocaleDateString('ar-SA',{...opts,calendar:'islamic'})}
  document.getElementById('gregDate').textContent=now.toLocaleDateString(loc,{...opts,calendar:'gregory'});
}

function applyTheme(){document.body.setAttribute('data-theme',theme);document.getElementById('btnTheme').textContent=theme==='dark'?'☀️':'🌙';localStorage.setItem('sa_theme',theme)}
function toggleTheme(){theme=theme==='dark'?'light':'dark';applyTheme()}

function applyLang(){
  const ar=lang==='ar';
  document.documentElement.lang=lang;
  document.documentElement.dir=ar?'rtl':'ltr';
  document.getElementById('btnLang').textContent=ar?'EN':'عربي';
  localStorage.setItem('sa_lang',lang);
  document.querySelectorAll('[data-ar]').forEach(el=>{el.textContent=ar?el.dataset.ar:el.dataset.en});
  document.querySelectorAll('[data-ph-ar]').forEach(el=>{el.placeholder=ar?el.dataset.phAr:el.dataset.phEn});
  updateDates();renderLB();
}
function toggleLang(){lang=lang==='ar'?'en':'ar';applyLang()}

function toast(msg,type='t-info'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast ${type} visible`;setTimeout(()=>el.classList.remove('visible'),3000)}

async function startSession(){
  const name=document.getElementById('inputName').value.trim();
  const subject=document.getElementById('inputSubject').value.trim();
  if(!name||!subject){toast(t('fill'),'t-error');return}
  if(!sessUUID){sessUUID=uuid();localStorage.setItem('sa_uuid',sessUUID)}
  const now=nowISO();
  const{data,error}=await sb.from(TABLE).insert({session_uuid:sessUUID,name,subject,status:'studying',started_at:now,last_resumed_at:now,total_study_seconds:0,created_date:todayStr()}).select().single();
  if(error){toast('Error: '+error.message,'t-error');return}
  myId=data.id;localStorage.setItem('sa_active',myId);
  showMyPanel(data);toast(t('started'),'t-success');
}

async function takeBreak(){const me=rows.find(r=>r.id===myId);if(!me||me.status!=='studying')return;await sb.from(TABLE).update({status:'break',total_study_seconds:liveSec(me),last_resumed_at:null}).eq('id',myId);toast(t('broke'),'t-info')}
async function resumeStudy(){await sb.from(TABLE).update({status:'studying',last_resumed_at:nowISO()}).eq('id',myId);toast(t('resumed'),'t-success')}
async function finishSession(){const me=rows.find(r=>r.id===myId);if(!me)return;await sb.from(TABLE).update({status:'finished',total_study_seconds:liveSec(me),last_resumed_at:null}).eq('id',myId);localStorage.removeItem('sa_active');myId=null;document.getElementById('mySession').style.display='none';document.getElementById('formSection').style.display='block';toast(t('ended'),'t-success')}

function showMyPanel(d){document.getElementById('formSection').style.display='none';document.getElementById('mySession').style.display='block';document.getElementById('mySubject').textContent=d.subject;updateMyUI(d)}
function updateMyUI(d){
  if(!d)return;
  const pill=document.getElementById('myPill'),text=document.getElementById('myPillText'),btns=document.getElementById('myBtns'),ar=lang==='ar';
  pill.className='session-status-pill';
  if(d.status==='studying'){pill.classList.add('pill-studying');text.textContent=t('studying');btns.innerHTML=`<button class="btn-session btn-break-action" onclick="takeBreak()">${ar?'☕ بريك':'☕ Break'}</button><button class="btn-session btn-finish-action" onclick="finishSession()">${ar?'✅ إنهاء':'✅ Finish'}</button>`}
  else if(d.status==='break'){pill.classList.add('pill-break');text.textContent=t('on_break');btns.innerHTML=`<button class="btn-session btn-resume-action" onclick="resumeStudy()">${ar?'📖 أكمل':'📖 Resume'}</button><button class="btn-session btn-finish-action" onclick="finishSession()">${ar?'✅ إنهاء':'✅ Finish'}</button>`}
}

function updateStats(){const active=rows.filter(r=>r.status==='studying').length;let totalSec=0;rows.forEach(r=>totalSec+=liveSec(r));document.getElementById('statActive').textContent=active;document.getElementById('statTotal').textContent=fmtHM(totalSec);document.getElementById('statCount').textContent=rows.length}

function renderLB(){
  const box=document.getElementById('lbContent');
  const el=document.getElementById('loader');if(el)el.remove();
  const order={studying:0,break:1,finished:2};
  const sorted=[...rows].sort((a,b)=>{const d=(order[a.status]??3)-(order[b.status]??3);return d!==0?d:liveSec(b)-liveSec(a)});
  if(!sorted.length){box.innerHTML=`<div class="empty-state"><div class="empty-icon">📚</div><h3>${lang==='ar'?'لا يوجد أحد بعد!':'No one here yet!'}</h3><p>${lang==='ar'?'كن أول من يبدأ المذاكرة 🔥':'Be the first to start studying 🔥'}</p></div>`;return}
  let html='<div class="lb-list">';
  sorted.forEach((s,i)=>{
    const rank=i+1,isMe=s.id===myId,sec=liveSec(s);
    const sKey=s.status==='studying'?'studying':s.status==='break'?'on_break':'finished';
    const sClass=s.status==='studying'?'c-studying':s.status==='break'?'c-break':'c-finished';
    let rc='';if(rank===1)rc='top-1';else if(rank===2)rc='top-2';else if(rank===3)rc='top-3';
    const badge=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    html+=`<div class="comp-card ${rc} ${isMe?'is-mine':''}" data-sid="${s.id}" style="animation-delay:${i*0.05}s"><div class="comp-rank">${badge}</div><div class="comp-info"><div class="comp-name">${esc(s.name)}${isMe?(lang==='ar'?' (أنت)':' (You)'):''}</div><div class="comp-subject">${esc(s.subject)}</div></div><div class="comp-right"><div class="comp-time">${fmt(sec)}</div><div class="comp-status ${sClass}"><span class="c-dot"></span>${t(sKey)}</div></div></div>`;
  });
  html+='</div>';box.innerHTML=html;
}

function startTick(){if(tickId)clearInterval(tickId);tickId=setInterval(()=>{if(myId){const me=rows.find(r=>r.id===myId);if(me)document.getElementById('myTimer').textContent=fmt(liveSec(me))}document.querySelectorAll('.comp-card').forEach(card=>{const s=rows.find(r=>r.id===card.dataset.sid);if(s){const te=card.querySelector('.comp-time');if(te)te.textContent=fmt(liveSec(s))}});updateStats()},1000)}

async function loadToday(){
  const{data,error}=await sb.from(TABLE).select('*').eq('created_date',todayStr()).order('started_at',{ascending:true});
  if(error){console.error(error);return}
  rows=data||[];renderLB();updateStats();
  if(myId){const me=rows.find(r=>r.id===myId);if(me&&me.status!=='finished')showMyPanel(me);else{localStorage.removeItem('sa_active');myId=null}}
}

function subscribe(){
  sb.channel('arena-live').on('postgres_changes',{event:'*',schema:'public',table:TABLE,filter:`created_date=eq.${todayStr()}`},payload=>{
    const{eventType,new:nr,old:or}=payload;
    if(eventType==='INSERT'){if(!rows.find(r=>r.id===nr.id))rows.push(nr)}
    else if(eventType==='UPDATE'){const i=rows.findIndex(r=>r.id===nr.id);if(i>=0)rows[i]=nr;else rows.push(nr);if(nr.id===myId){updateMyUI(nr);if(nr.status==='finished'){localStorage.removeItem('sa_active');myId=null;document.getElementById('mySession').style.display='none';document.getElementById('formSection').style.display='block'}}}
    else if(eventType==='DELETE'){rows=rows.filter(r=>r.id!==(or?.id||nr?.id))}
    renderLB();updateStats();
  }).subscribe(status=>{
    const badge=document.getElementById('syncBadge'),label=document.getElementById('syncLabel');
    if(status==='SUBSCRIBED'){badge.classList.remove('offline');label.textContent=lang==='ar'?'متصل':'Connected'}
    else if(status==='CLOSED'||status==='CHANNEL_ERROR'){badge.classList.add('offline');label.textContent=lang==='ar'?'غير متصل':'Disconnected'}
  });
}

async function init(){
  if(!sessUUID){sessUUID=uuid();localStorage.setItem('sa_uuid',sessUUID)}
  applyTheme();applyLang();await loadToday();subscribe();startTick();setInterval(updateDates,60000);
}
init();
</script>
</body>
