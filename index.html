<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ساحة الدوافيير | Dawafeer Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
--fa:'Tajawal',sans-serif;--fe:'Outfit',sans-serif;--fm:'Outfit',sans-serif;
--bg0:#0A1929;--bg1:#0E2137;--bg2:#132C43;--bg3:#1B3A55;
--gl:rgba(14,33,55,.65);--gls:rgba(14,33,55,.82);
--bd:rgba(255,255,255,.05);--bd2:rgba(255,255,255,.09);
--t1:#F2F0FA;--t2:#A6A2B8;--t3:#6E6A80;
--nb:#5B8AFF;--nc:#00E5CC;--np:#A855F7;--nk:#EC4899;--ng:#34D399;--no:#FB923C;--nr:#F87171;
--gm:linear-gradient(135deg,var(--nb),var(--nc));
--gw:linear-gradient(135deg,var(--nk),var(--np));
--gg:linear-gradient(135deg,#FFD700,#FF8C00);--gs:linear-gradient(135deg,#C0C0C0,#708090);--gbr:linear-gradient(135deg,#CD7F32,#A0522D);
--glb:0 0 30px rgba(91,138,255,.12);--gln:0 0 50px rgba(91,138,255,.15),0 0 100px rgba(0,229,204,.05);
--r:16px;--rs:10px;--rl:24px;--rf:9999px;
--ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="light"]{
--bg0:#F3F1EC;--bg1:#FFFFFF;--bg2:#EDE9E0;--bg3:#DDD8CE;
--gl:rgba(255,255,255,.72);--gls:rgba(255,255,255,.88);
--bd:rgba(0,0,0,.05);--bd2:rgba(0,0,0,.09);
--t1:#1A1825;--t2:#5C5869;--t3:#9A96A6;
--nb:#3B6AE0;--nc:#00B8A3;--ng:#1A9960;--no:#D97706;--nr:#DC2626;
--glb:0 0 20px rgba(59,106,224,.08);--gln:0 4px 24px rgba(0,0,0,.06);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body,body *{font-feature-settings:'tnum'}
.st-n,.timer-val,.ct,.rk{font-variant-numeric:tabular-nums;unicode-bidi:plaintext;direction:ltr;display:inline-block}
html{scroll-behavior:smooth;-webkit-locale:'en'}
body{font-family:var(--fa);background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .6s var(--ease),color .4s var(--ease)}
[dir="ltr"] body,[dir="ltr"] input,[dir="ltr"] button{font-family:var(--fe)}
.page-reveal{position:fixed;inset:0;z-index:9999;background:var(--bg0);display:flex;align-items:center;justify-content:center;transition:opacity .6s var(--ease),visibility .6s}
.page-reveal.done{opacity:0;visibility:hidden;pointer-events:none}
.reveal-logo{font-size:36px;font-weight:900;background:var(--gm);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:revealPulse 1s ease-in-out infinite alternate}
@keyframes revealPulse{0%{opacity:.4;transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
.bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);will-change:transform}
[data-theme="light"] .orb{opacity:.04!important}
.o1{width:600px;height:600px;background:#4A90D9;opacity:.07;top:-150px;right:-150px;animation:oF 25s ease-in-out infinite}
.o2{width:500px;height:500px;background:#1B5E9E;opacity:.06;bottom:-120px;left:-120px;animation:oF 30s ease-in-out infinite reverse}
.o3{width:350px;height:350px;background:var(--nc);opacity:.04;top:40%;left:40%;animation:oF 20s ease-in-out infinite 5s}
@keyframes oF{0%,100%{transform:translate(0,0)scale(1)}50%{transform:translate(-30px,40px)scale(.92)}}
.grid-lines{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--bd) 1px,transparent 1px),linear-gradient(90deg,var(--bd) 1px,transparent 1px);background-size:60px 60px;opacity:.3}
[data-theme="light"] .grid-lines{opacity:.15}
canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{max-width:680px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
.logo-wrap{text-align:center;padding:44px 0 16px}
.logo-wrap a{display:inline-block;transition:transform .3s}
.logo-wrap a:hover{transform:scale(1.05)}
.logo-wrap img{width:180px;height:180px;object-fit:contain;transition:all .3s}
.logo-dark{display:inline}.logo-light{display:none}
[data-theme="light"] .logo-dark{display:none}[data-theme="light"] .logo-light{display:inline}
.topbar{display:flex;align-items:center;justify-content:flex-end;padding:16px 0;border-bottom:1px solid var(--bd2)}
.tb-acts{display:flex;gap:6px}
.tb{width:38px;height:38px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--gl);backdrop-filter:blur(16px);color:var(--t2);font-size:14px;cursor:pointer;display:grid;place-items:center;transition:all .3s var(--ease)}
.tb:hover{border-color:var(--nb);color:var(--nb)}
.stg{opacity:0;transform:translateY(24px);animation:stgIn .7s var(--ease) forwards}
@keyframes stgIn{to{opacity:1;transform:translateY(0)}}
.hero{text-align:center;padding:36px 0 28px}
.hero h1{font-size:42px;font-weight:900;letter-spacing:-1px;margin-bottom:14px;background:var(--gm);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{font-size:15px;color:var(--t3);max-width:400px;margin:0 auto;line-height:1.8}
.glow-center{position:absolute;width:200px;height:200px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(91,138,255,.15),transparent 70%);filter:blur(40px);pointer-events:none;z-index:-1}
@keyframes borderGlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.day-header{position:relative}
.day-header::after{content:'';position:absolute;inset:-1.5px;border-radius:inherit;padding:1.5px;background:linear-gradient(90deg,var(--nb),var(--nc),var(--np),var(--nb));background-size:300% 100%;animation:borderGlow 4s linear infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1}

.land-card{position:relative}
.land-card.active-card::after{content:'';position:absolute;inset:-1.5px;border-radius:inherit;padding:1.5px;background:linear-gradient(90deg,var(--nb),var(--nc),var(--np),var(--nb));background-size:300% 100%;animation:borderGlow 4s linear infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1;opacity:.6}
.land-card.active-card:hover::after{opacity:1}

.landing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
@media(max-width:680px){.landing-grid{grid-template-columns:1fr}}
.land-card{background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:var(--rl);padding:32px 24px;text-align:center;cursor:pointer;transition:all .4s var(--ease);position:relative;overflow:hidden}
.active-card{z-index:1}
.coming-card{opacity:.6;cursor:default;z-index:1}
.active-card:hover{border-color:rgba(91,138,255,.25);transform:translateY(-4px);box-shadow:0 12px 40px rgba(91,138,255,.15)}
.coming-card{opacity:.6;cursor:default}
.platform-card::before{background:linear-gradient(135deg,var(--nb),var(--np))}
.platform-card:hover{border-color:rgba(168,85,247,.25);transform:translateY(-4px);box-shadow:0 12px 40px rgba(168,85,247,.15)}
.platform-card .land-logo{width:72px;height:72px;object-fit:contain;margin-bottom:14px;border-radius:12px;transition:all .3s}
.platform-card:hover .land-logo{transform:scale(1.1);filter:drop-shadow(0 4px 12px rgba(168,85,247,.3))}
.platform-card .land-btn{background:linear-gradient(135deg,var(--nb),var(--np))}
.land-icon{font-size:48px;margin-bottom:16px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2))}
.land-card h3{font-size:20px;font-weight:900;margin-bottom:10px}
.land-card p{font-size:13px;color:var(--t3);line-height:1.7;margin-bottom:18px}
.land-btn{display:inline-block;padding:10px 28px;background:var(--gm);color:#FFF;font-size:14px;font-weight:700;border-radius:var(--rf);transition:all .3s}
.land-soon{display:inline-block;padding:8px 22px;background:rgba(251,146,60,.1);color:var(--no);font-size:13px;font-weight:700;border-radius:var(--rf);border:1px solid rgba(251,146,60,.15)}
.arena-back{display:inline-flex;align-items:center;gap:8px;color:var(--nb);font-size:13px;font-weight:700;cursor:pointer;padding:8px 0;margin-bottom:16px;transition:all .3s}
.arena-back:hover{opacity:.7}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.st-box{background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:var(--r);padding:18px 12px;text-align:center;transition:all .3s}
.st-box:hover{border-color:rgba(91,138,255,.15);transform:translateY(-3px)}
.st-i{font-size:24px;margin-bottom:4px}.st-n{font-family:var(--fm);font-size:28px;font-weight:800}.st-l{font-size:10.5px;color:var(--t3);margin-top:2px;font-weight:600}
.f-card{background:var(--gls);backdrop-filter:blur(24px);border:1px solid var(--bd2);border-radius:var(--rl);padding:32px 26px;position:relative;overflow:hidden;box-shadow:var(--gln);margin-bottom:20px}
.f-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gm)}
.f-head{text-align:center;margin-bottom:26px}.f-head h2{font-size:22px;font-weight:900;margin-bottom:8px}.f-head p{font-size:13.5px;color:var(--t3);line-height:1.7}
.fld{margin-bottom:14px}.fl{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--t2);margin-bottom:6px}.fi{font-size:16px}
.fin{width:100%;padding:14px 18px;background:var(--bg2);border:1.5px solid var(--bd2);border-radius:var(--rs);color:var(--t1);font-size:15px;font-family:inherit;outline:none;transition:all .35s}
.fin:focus{border-color:var(--nb);box-shadow:0 0 0 3px rgba(91,138,255,.12)}
.fin::placeholder{color:var(--t3)}
.btn-go{width:100%;padding:16px;border:none;border-radius:var(--rs);background:var(--gm);color:#FFF;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .35s}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(91,138,255,.35)}
.btn-go:active{transform:scale(.98)}
.s-card{background:var(--gls);backdrop-filter:blur(24px);border:1.5px solid rgba(91,138,255,.25);border-radius:var(--rl);padding:36px 28px;text-align:center;position:relative;box-shadow:0 0 40px rgba(91,138,255,.1);overflow:hidden;transition:border-color .5s,box-shadow .5s;margin-bottom:20px}
.s-card.brk{border-color:rgba(251,146,60,.25);box-shadow:0 0 40px rgba(251,146,60,.08)}
.s-lbl{background:var(--gm);color:#FFF;font-size:12px;font-weight:800;padding:6px 24px;border-radius:var(--rf);box-shadow:0 4px 12px rgba(91,138,255,.3);display:inline-block;margin-bottom:8px}
.timer-wrap{position:relative;width:200px;height:200px;margin:20px auto}
.timer-ring{position:absolute;inset:0}.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bd2);stroke-width:3}.ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease)}
.timer-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:44px;font-weight:800;letter-spacing:2px}
.s-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 18px;border-radius:var(--rf);font-size:12px;font-weight:700;margin-bottom:16px}
.sp-s{background:rgba(52,211,153,.08);color:var(--ng);border:1px solid rgba(52,211,153,.15)}
.sp-b{background:rgba(251,146,60,.08);color:var(--no);border:1px solid rgba(251,146,60,.15)}
.sp-d{width:7px;height:7px;border-radius:50%;display:inline-block}
.sp-s .sp-d{background:var(--ng);animation:pls 1.5s infinite}.sp-b .sp-d{background:var(--no);animation:pls 1.5s infinite}
@keyframes pls{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.bs{flex:1;padding:12px;border-radius:var(--rs);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .3s;border:1.5px solid;background:transparent}
.bs:active{transform:scale(.95)}
.b-brk{border-color:var(--no);color:var(--no)}.b-brk:hover{background:rgba(251,146,60,.08)}
.b-rsm{border-color:var(--ng);color:var(--ng)}.b-rsm:hover{background:rgba(52,211,153,.08)}
.b-fin{border-color:var(--nr);color:var(--nr)}.b-fin:hover{background:rgba(248,113,113,.08)}
.b-sw{border-color:var(--nb);color:var(--nb)}.b-sw:hover{background:rgba(91,138,255,.08)}
.lb{margin-bottom:24px}
.lb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.lb-top h2{font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px}
.cb{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.12);border-radius:var(--rf);font-size:10.5px;font-weight:700;color:var(--ng)}
.cb.off{background:rgba(248,113,113,.06);border-color:rgba(248,113,113,.12);color:var(--nr)}
.cb .cd{width:6px;height:6px;border-radius:50%;background:var(--ng);animation:pls 2s infinite}
.cb.off .cd{background:var(--nr);animation:none}
.lb-list{display:flex;flex-direction:column;gap:8px}
.lc{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--gl);backdrop-filter:blur(14px);border:1px solid var(--bd2);border-radius:var(--r);transition:all .35s;animation:cUp .4s var(--ease) both;cursor:default}
@keyframes cUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.lc:hover{border-color:rgba(91,138,255,.12)}
.lc.urgent{border-color:rgba(248,113,113,.2);box-shadow:0 0 12px rgba(248,113,113,.08)}
.rk{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:14px;font-family:var(--fm);flex-shrink:0;background:var(--bg3);color:var(--t2);border:2px solid var(--bd2)}
.ci{flex:1;min-width:0}.cn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-size:11px;color:var(--t3);margin-top:1px}
.cr{text-align:end;flex-shrink:0}
.ct{font-family:var(--fm);font-size:16px;font-weight:800}
.cst{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:var(--rf);margin-top:3px}
.ss{background:rgba(52,211,153,.08);color:var(--ng)}.sb{background:rgba(251,146,60,.08);color:var(--no)}
.sd{width:5px;height:5px;border-radius:50%;display:inline-block}
.ss .sd{background:var(--ng);animation:pls 1.4s infinite}.sb .sd{background:var(--no);animation:pls 1.4s infinite}
.ebox{text-align:center;padding:40px 20px;background:var(--gl);border:1px dashed var(--bd2);border-radius:var(--rl);backdrop-filter:blur(12px)}
.ebox .ei{font-size:40px;margin-bottom:10px}.ebox h3{font-size:15px;font-weight:800;color:var(--t2);margin-bottom:4px}.ebox p{font-size:12px;color:var(--t3)}
.peak-card{background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:var(--r);padding:20px;margin-bottom:20px}
.peak-title{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 26px;border-radius:var(--rf);font-size:13px;font-weight:700;font-family:inherit;z-index:9999;transition:transform .5s var(--bounce);box-shadow:0 8px 32px rgba(0,0,0,.4);white-space:nowrap}
.toast.v{transform:translateX(-50%) translateY(0)}.toast.ts{background:rgba(52,211,153,.9);color:#FFF}.toast.te{background:rgba(248,113,113,.9);color:#FFF}.toast.ti{background:rgba(91,138,255,.9);color:#FFF}
@media(max-width:480px){.hero h1{font-size:32px}.timer-val{font-size:34px}.timer-wrap{width:160px;height:160px}.f-card{padding:24px 20px}.lc{padding:12px;gap:10px}}
</style>
</head>
<body data-theme="dark">
<div class="page-reveal" id="reveal"><div class="reveal-logo" data-ar="ساحة الدوافيير" data-en="Dawafeer Arena"></div></div>
<div class="bg-scene"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="grid-lines"></div>
<canvas id="particles"></canvas>
<div class="wrap">
  <div class="topbar stg" style="animation-delay:.3s"><div></div><div class="tb-acts"><button class="tb" id="bL" onclick="tgL()">EN</button><button class="tb" id="bT" onclick="tgT()">☀️</button></div></div>
  <div style="text-align:center;padding:10px 0 4px">
    <div style="display:inline-flex;align-items:center;gap:8px;background:var(--gl);backdrop-filter:blur(16px);border:1px solid var(--bd2);border-radius:var(--rf);padding:8px 20px">
      <span style="font-size:12px;color:var(--t3)" data-ar="🕐 الوقت الآن" data-en="🕐 Current Time"></span>
      <span id="liveClock" style="font-family:var(--fm);font-size:16px;font-weight:800;color:var(--nb);letter-spacing:1px;direction:ltr;display:inline-block">--:--:--</span>
    </div>

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function rem(s){if(s.status==='finished'||!s.ends_at)return 0;return Math.max(0,Math.floor((new Date(s.ends_at).getTime()-Date.now())/1000))}
function fmtT(sec){if(sec<=0)return'00:00';const m=Math.floor(sec/60),s=sec%60;return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function fmtHM(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h>0?`${h}h ${m}m`:`${m}m`}
function ring(pct){const fg=document.getElementById('ringFg');if(fg)fg.style.strokeDashoffset=565.48-(Math.min(pct,1)*565.48)}
function toast(m,c='ti'){const e=document.getElementById('tst');e.textContent=m;e.className=`toast ${c} v`;setTimeout(()=>e.classList.remove('v'),3000)}
function playBell(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='sine';g.gain.value=0.3;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);o.stop(ctx.currentTime+0.8)}catch(e){}}

/* START SESSION */
async function startSession(){
  const name=document.getElementById('iN').value.trim();
  const subj=document.getElementById('iS').value.trim();
  let mins=parseInt(document.getElementById('iMin').value)||25;
  if(!name||!subj){toast(ar()?'أدخل اسمك والمادة':'Enter name & subject','te');return}
  if(mins>120){mins=120;document.getElementById('iMin').value=120}
  if(!uid){uid=mkid();localStorage.setItem('sa_u',uid)}
  const now=new Date();const durSec=mins*60;
  const endsAt=new Date(now.getTime()+durSec*1000).toISOString();
  const{data,error}=await sb.from(TB).insert({
    session_uuid:uid,name,subject:subj,status:'studying',
    study_duration_minutes:mins,remaining_seconds:durSec,current_phase:'study',
    ends_at:endsAt,started_at:now.toISOString(),created_date:td()
  }).select().single();
  if(error){toast('Error: '+error.message,'te');return}
  mid=data.id;localStorage.setItem('sa_m',mid);
  showTimer(data);toast(ar()?'بدأت جلستك! 🔥':'Started! 🔥','ts');
}

function showTimer(d){
  document.getElementById('joinForm').style.display='none';
  document.getElementById('myTimer').style.display='block';
  document.getElementById('tSubj').textContent=d.subject;
  renderBtns(d);
}

function renderBtns(d){
  const b=document.getElementById('tBtns');const pill=document.getElementById('tPill');const ptxt=document.getElementById('tPillTxt');
  const card=document.getElementById('timerCard');card.classList.remove('brk');pill.className='s-pill';
  if(d.status==='studying'){
    pill.classList.add('sp-s');ptxt.textContent=ar()?'يذاكر الآن':'Studying';
    b.innerHTML=`<button class="bs b-brk" onclick="doBreak()">${ar()?'☕ بريك':'☕ Break'}</button><button class="bs b-fin" onclick="doFinish()">${ar()?'✅ إنهاء':'✅ Finish'}</button>`;
  }else if(d.status==='break'){
    pill.classList.add('sp-b');ptxt.textContent=ar()?'بريك':'Break';card.classList.add('brk');
    b.innerHTML=`<button class="bs b-rsm" onclick="doResume()">${ar()?'📖 أكمل':'📖 Resume'}</button><button class="bs b-fin" onclick="doFinish()">${ar()?'✅ إنهاء':'✅ Finish'}</button>`;
  }
}

/* ACTIONS */
async function doBreak(){
  const me=R.find(r=>r.id===mid);if(!me)return;
  const now=new Date();const dur=5*60;
  await sb.from(TB).update({status:'break',current_phase:'break',remaining_seconds:dur,ends_at:new Date(now.getTime()+dur*1000).toISOString()}).eq('id',mid);
  toast(ar()?'بريك ☕':'Break ☕','ti');
}
async function doResume(){
  const me=R.find(r=>r.id===mid);if(!me)return;
  const now=new Date();const dur=(me.study_duration_minutes||25)*60;
  await sb.from(TB).update({status:'studying',current_phase:'study',remaining_seconds:dur,ends_at:new Date(now.getTime()+dur*1000).toISOString()}).eq('id',mid);
  toast(ar()?'أكمل! 💪':'Resumed! 💪','ts');
}
async function doFinish(){
  await sb.from(TB).update({status:'finished',remaining_seconds:0,ends_at:null}).eq('id',mid);
  addLocalStats();
  localStorage.removeItem('sa_m');mid=null;
  document.getElementById('myTimer').style.display='none';
  document.getElementById('joinForm').style.display='block';
  toast(ar()?'أحسنت! ✅':'Well done! ✅','ts');
}

/* LOCAL STATS */
function getStats(){try{return JSON.parse(localStorage.getItem('sa_stats'))||{}}catch(e){return{}}}
function addLocalStats(){
  const me=R.find(r=>r.id===mid);if(!me)return;
  const s=getStats();const k=td();
  if(!s[k])s[k]={totalSec:0,sessions:0};
  s[k].totalSec+=(me.study_duration_minutes||25)*60;
  s[k].sessions++;
  localStorage.setItem('sa_stats',JSON.stringify(s));refreshStats();
}
function refreshStats(){
  const s=getStats();const t=s[td()]||{totalSec:0,sessions:0};
  const e1=document.getElementById('stTotal');const e2=document.getElementById('stSess');
  if(e1)e1.textContent=fmtHM(t.totalSec);if(e2)e2.textContent=t.sessions;
}

/* LEADERBOARD — live from Supabase */
function rLB(){
  const bx=document.getElementById('lB');if(!bx)return;
  const active=R.filter(s=>s.status!=='finished'&&rem(s)>0).sort((a,b)=>rem(a)-rem(b));
  if(!active.length){bx.innerHTML=`<div class="ebox"><div class="ei">📚</div><h3>${ar()?'لا يوجد أحد يذاكر الآن':'No one studying now'}</h3><p>${ar()?'كن أول من يبدأ! 🔥':'Be the first! 🔥'}</p></div>`;return}
  let h='<div class="lb-list">';
  active.forEach((s,i)=>{
    const rk=i+1,isme=s.id===mid,r=rem(s);
    const stc=s.status==='studying'?'ss':'sb';
    const stk=s.status==='studying'?(ar()?'يذاكر':'Studying'):(ar()?'بريك':'Break');
    const urgent=r>0&&r<60?'urgent':'';
    h+=`<div class="lc ${isme?'me':''} ${urgent}" style="animation-delay:${i*.04}s">
      <div class="rk">${rk}</div>
      <div class="ci"><div class="cn">${esc(s.name)}${isme?(ar()?' (أنت)':' (You)'):''}</div><div class="cs">${esc(s.subject)}</div></div>
      <div class="cr"><div class="ct" data-sid="${s.id}">${fmtT(r)}</div><div class="cst ${stc}"><span class="sd"></span>${stk}</div></div>
    </div>`;
  });
  h+='</div>';bx.innerHTML=h;
}

/* TICK */
function startTick(){if(tick)clearInterval(tick);tick=setInterval(async()=>{
  if(mid){
    const me=R.find(r=>r.id===mid);
    if(me&&me.status!=='finished'){
      const r=rem(me);
      document.getElementById('tDisp').textContent=fmtT(r);
      const dur=(me.current_phase==='study'?(me.study_duration_minutes||25):5)*60;
      ring(1-r/dur);
      renderBtns(me);
      if(r<=0&&me.ends_at){
        playBell();
        await sb.from(TB).update({status:'finished',remaining_seconds:0,ends_at:null}).eq('id',mid);
        addLocalStats();localStorage.removeItem('sa_m');mid=null;
        document.getElementById('myTimer').style.display='none';document.getElementById('joinForm').style.display='block';
        toast(ar()?'انتهى الوقت! أحسنت ✅':'Time up! Well done ✅','ts');
        await loadData();return;
      }
    }
  }
  document.querySelectorAll('.ct[data-sid]').forEach(el=>{const s=R.find(r=>r.id===el.dataset.sid);if(s)el.textContent=fmtT(rem(s))});
  rLB();
},1000)}

/* LOAD & REALTIME */
async function loadData(){
  const{data}=await sb.from(TB).select('*').eq('created_date',td()).order('started_at',{ascending:true});
  R=data||[];rLB();
  if(mid){const me=R.find(r=>r.id===mid);if(me&&me.status!=='finished')showTimer(me);else{localStorage.removeItem('sa_m');mid=null}}
}
function subRT(){
  sb.channel('arena-live').on('postgres_changes',{event:'*',schema:'public',table:TB,filter:`created_date=eq.${td()}`},()=>loadData())
  .subscribe(st=>{const b=document.getElementById('cB'),l=document.getElementById('cL');
    if(st==='SUBSCRIBED'){b.classList.remove('off');l.textContent=ar()?'متصل':'Connected'}
    else if(st==='CLOSED'||st==='CHANNEL_ERROR'){b.classList.add('off');l.textContent=ar()?'غير متصل':'Disconnected'}
  });
}

function showExamTable(key){
  const d=EXAM_DATA[key];if(!d)return;
  document.getElementById('exColleges').style.display='none';
  document.getElementById('exTable').style.display='block';
  document.getElementById('exTableTitle').textContent=ar()?d.ar:d.en;

  const body=document.getElementById('exTableBody');
  if(!d.exams.length){
    body.innerHTML=`<div class="ebox"><div class="ei">📅</div><h3>${ar()?'لم يتم إضافة الجدول بعد':'Schedule not added yet'}</h3><p>${ar()?'سيتم إضافته قريباً':'Coming soon'}</p></div>`;
    return;
  }

  // Group by date+time
  const groups={};
  d.exams.forEach(ex=>{
    const k=ex.date+'|'+ex.time;
    if(!groups[k])groups[k]={date:ex.date,day:ex.day,time:ex.time,items:[]};
    groups[k].items.push(ex);
  });

  const TIME_MAP={
    '08:30':{start:'08:30 AM',end:'09:30 AM',durMin:60},
    '09:00':{start:'09:00 AM',end:'10:30 AM',durMin:90},
    '10:00':{start:'10:00 AM',end:'11:00 AM',durMin:60},
    '11:30':{start:'11:30 AM',end:'01:00 PM',durMin:90},
    '13:00':{start:'01:00 PM',end:'02:00 PM',durMin:60}
  };

  let h='';
  Object.values(groups).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).forEach(g=>{
    const tm=TIME_MAP[g.time]||{start:g.time,end:'',durMin:90};
    const timeLabel=tm.end?`${tm.start} — ${tm.end}`:tm.start;
    const startLabel=ar()?`يبدأ الاختبار الساعة ${tm.start}`:`Exam starts at ${tm.start}`;
    const endLabel=ar()?`ينتهي الاختبار الساعة ${tm.end}`:`Exam ends at ${tm.end}`;
    const dayAr={'Sunday':'الأحد','Monday':'الإثنين','Tuesday':'الثلاثاء','Wednesday':'الأربعاء','Thursday':'الخميس'}[g.day]||g.day;
    
    h+=`<div style="margin-bottom:36px">
      <div class="day-header" style="background:var(--gls);border:1.5px solid rgba(91,138,255,.2);border-radius:var(--r);padding:20px 22px;margin-bottom:12px;box-shadow:0 4px 20px rgba(91,138,255,.08)">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--gm)"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:20px;font-weight:900">📅 ${ar()?dayAr:g.day}</div>
          <div style="font-size:14px;color:var(--t2);margin-top:4px;font-weight:600">${g.date}</div>
        </div>
        <div style="background:rgba(91,138,255,.1);border:1px solid rgba(91,138,255,.15);border-radius:var(--r);padding:10px 18px;text-align:start">
          <div style="font-size:12px;font-weight:700;color:var(--ng);margin-bottom:4px">🟢 ${startLabel}</div>
          <div style="font-size:12px;font-weight:700;color:var(--nr)">🔴 ${endLabel}</div>
        </div>
        </div>
      </div>`;

    g.items.forEach(ex=>{
      const parts=ex.subject.match(/^([A-Z]{2,6}\d{3}[A-Z]?)\s+(.+)$/);
      const code=parts?parts[1]:ex.subject.split(' ')[0];
      const nameEn=parts?parts[2]:ex.subject;
      const nameAr=COURSE_AR[nameEn]||'';
      const examTimeStr=ex.date+'T'+ex.time.padStart(5,'0')+':00';
      const durMin=TIME_MAP[g.time]?TIME_MAP[g.time].durMin:90;
      const tP=g.time.split(':');
      const endTotalMin=parseInt(tP[0])*60+parseInt(tP[1]||0)+durMin;
      const examEndStr=ex.date+'T'+String(Math.floor(endTotalMin/60)).padStart(2,'0')+':'+String(endTotalMin%60).padStart(2,'0')+':00';
      const cid='ex_'+Math.random().toString(36).substr(2,8);

      h+=`<div data-exam-card style="background:var(--gl);border:1px solid var(--bd2);border-radius:var(--rs);padding:14px 16px;margin-bottom:6px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;transition:opacity .3s">
        <div>
          <div style="font-size:16px;font-weight:900;background:var(--gm);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;margin-bottom:5px;font-family:var(--fm)">${esc(code)}</div>
          <div style="font-size:14px;font-weight:700;margin-bottom:2px">${esc(nameEn)}</div>
          ${nameAr?`<div style="font-size:12px;color:var(--t3)">${esc(nameAr)}</div>`:''}
        </div>
        <div style="text-align:center;min-width:100px">
          <div class="ct exam-cd" data-target="${examTimeStr}" data-end="${examEndStr}" id="${cid}" style="font-size:16px;font-weight:800"></div>
          <div style="font-size:9px;color:var(--t3);margin-top:3px">${ar()?'المتبقي':'Remaining'}</div>
        </div>
      </div>`;
    });

    h+=`</div>`;
  });

  body.innerHTML=h;
  updateExamCountdowns();
}

function parseRT(str){
  const p=str.replace('T',' ').replace('Z','').split(/[- :]/);
  return Date.UTC(+p[0],+p[1]-1,+p[2],+p[3],+p[4],+p[5]||0);
}

function updateExamCountdowns(){
  // Get Riyadh time using reliable Intl method
  const nowStr=new Date().toLocaleString('en-US',{timeZone:'Asia/Riyadh',hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const nowParts=nowStr.split(':');
  const nowDateStr=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Riyadh'}); // YYYY-MM-DD
  const riyadhNow=Date.UTC(+nowDateStr.split('-')[0],+nowDateStr.split('-')[1]-1,+nowDateStr.split('-')[2],+nowParts[0],+nowParts[1],+nowParts[2]);

  const clk=document.getElementById('liveClock');
  if(clk){
    const hh=parseInt(nowParts[0]),mm=nowParts[1],ss=nowParts[2];
    const ampm=hh>=12?(ar()?'م':'PM'):(ar()?'ص':'AM');
    const h12=hh%12||12;
    clk.textContent=`${h12}:${mm}:${ss} ${ampm}`;
  }

  document.querySelectorAll('.exam-cd').forEach(el=>{
    const startMs=parseRT(el.dataset.target);
    const endMs=el.dataset.end?parseRT(el.dataset.end):(startMs+90*60000);
    const card=el.closest('[data-exam-card]');

    const diffStart=Math.floor((startMs-riyadhNow)/1000);
    const diffEnd=Math.floor((endMs-riyadhNow)/1000);

    if(diffStart>0){
      const d=Math.floor(diffStart/86400),h=Math.floor((diffStart%86400)/3600),m=Math.floor((diffStart%3600)/60),s=diffStart%60;
      if(ar()){
        let txt='متبقي ';
        if(d>0)txt+=d+' يوم و ';
        txt+=h+' ساعة و '+m+' دقيقة و '+s+' ثانية';
        el.textContent=txt;
      }else{
        let txt='';
        if(d>0)txt+=d+'d '+h+'h '+m+'m '+s+'s';
        else txt+=h+'h '+m+'m '+s+'s';
        el.textContent=txt;
      }
      el.style.color='';
      if(card)card.style.opacity='';
    }else if(diffEnd>0){
      el.textContent=ar()?'⏳ بدأ الاختبار':'⏳ Exam in progress';
      el.style.color='var(--no)';
      if(card)card.style.opacity='';
    }else{
      el.textContent=ar()?'✅ انتهى الاختبار':'✅ Exam ended';
      el.style.color='var(--t3)';
      if(card)card.style.opacity='.5';
    }
  });
}
setInterval(updateExamCountdowns,1000);
