<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ساحة المذاكرة | Study Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --font-ar: 'IBM Plex Sans Arabic', sans-serif;
  --font-en: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Light Theme */
  --bg-primary: #FAFBFC;
  --bg-secondary: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-input: #F4F6F8;
  --bg-hover: #F0F2F5;
  --border: #E2E6EA;
  --border-focus: #4F8CFF;
  --text-primary: #1A1D23;
  --text-secondary: #5A6270;
  --text-muted: #8B919A;
  --accent: #4F8CFF;
  --accent-light: #E8F0FF;
  --accent-dark: #3A6FD8;
  --success: #22C55E;
  --success-light: #DCFCE7;
  --warning: #F59E0B;
  --warning-light: #FEF3C7;
  --danger: #EF4444;
  --danger-light: #FEE2E2;
  --gold: #F59E0B;
  --silver: #94A3B8;
  --bronze: #D97706;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
  --shadow-glow: 0 0 20px rgba(79,140,255,0.15);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --pulse-studying: #22C55E;
  --pulse-break: #F59E0B;
}

[data-theme="dark"] {
  --bg-primary: #0F1117;
  --bg-secondary: #181B23;
  --bg-card: #1C1F2A;
  --bg-input: #252836;
  --bg-hover: #2A2D3A;
  --border: #2E3140;
  --border-focus: #5B9AFF;
  --text-primary: #F0F2F5;
  --text-secondary: #9CA3AF;
  --text-muted: #6B7280;
  --accent: #5B9AFF;
  --accent-light: #1E2A45;
  --accent-dark: #7BB3FF;
  --success: #34D399;
  --success-light: #0D2818;
  --warning: #FBBF24;
  --warning-light: #2A2210;
  --danger: #F87171;
  --danger-light: #2A1215;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 25px rgba(91,154,255,0.2);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-ar);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background 0.4s ease, color 0.3s ease;
  overflow-x: hidden;
}

[dir="ltr"] body { font-family: var(--font-en); }
[dir="ltr"] .card-name, [dir="ltr"] .stat-value { font-family: var(--font-en); }

/* ===== HEADER ===== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.date-display {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.date-display .hijri {
  font-weight: 600;
  color: var(--text-primary);
}

.top-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}

.icon-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--accent);
}

/* ===== HERO ===== */
.hero {
  text-align: center;
  padding: 40px 20px 24px;
}

.hero-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-motivational {
  font-size: 15px;
  color: var(--text-muted);
  font-weight: 400;
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex;
  gap: 12px;
  padding: 0 20px;
  margin-bottom: 24px;
  justify-content: center;
  flex-wrap: wrap;
}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}

.stat-icon {
  font-size: 18px;
}

.stat-info {
  display: flex;
  flex-direction: column;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-value {
  font-size: 18px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--text-primary);
}

/* ===== JOIN FORM ===== */
.join-section {
  max-width: 440px;
  margin: 0 auto 32px;
  padding: 0 20px;
}

.join-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 28px;
  box-shadow: var(--shadow-md);
}

.join-card h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
  text-align: center;
}

.field-group {
  margin-bottom: 16px;
}

.field-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.field-input {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

.field-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-light);
}

.field-input::placeholder {
  color: var(--text-muted);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--accent);
  color: #FFF;
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: var(--shadow-glow); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ===== MY SESSION PANEL ===== */
.my-session {
  max-width: 440px;
  margin: 0 auto 32px;
  padding: 0 20px;
  display: none;
}

.session-card {
  background: var(--bg-card);
  border: 2px solid var(--accent);
  border-radius: var(--radius-xl);
  padding: 24px;
  box-shadow: var(--shadow-glow);
  text-align: center;
}

.session-subject {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.session-timer {
  font-size: 42px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--text-primary);
  margin: 12px 0;
  letter-spacing: 2px;
}

.session-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 20px;
}

.status-studying { background: var(--success-light); color: var(--success); }
.status-break { background: var(--warning-light); color: var(--warning); }
.status-finished { background: var(--danger-light); color: var(--danger); }

.pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}

.status-studying .pulse-dot { background: var(--success); }
.status-break .pulse-dot { background: var(--warning); }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

.session-actions {
  display: flex;
  gap: 10px;
}

.btn-session {
  flex: 1;
  padding: 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg-input);
  color: var(--text-primary);
}

.btn-break { border-color: var(--warning); color: var(--warning); }
.btn-break:hover { background: var(--warning-light); }
.btn-resume { border-color: var(--success); color: var(--success); }
.btn-resume:hover { background: var(--success-light); }
.btn-finish { border-color: var(--danger); color: var(--danger); }
.btn-finish:hover { background: var(--danger-light); }

/* ===== LEADERBOARD ===== */
.leaderboard-section {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

.leaderboard-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.leaderboard-title {
  font-size: 18px;
  font-weight: 600;
}

.sync-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

.sync-dot.disconnected { background: var(--danger); animation: none; }

.competitor-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.competitor-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  transition: all 0.3s;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.competitor-card.is-me {
  border-color: var(--accent);
  background: var(--accent-light);
}

.competitor-card.rank-1 { border-color: var(--gold); box-shadow: 0 0 15px rgba(245,158,11,0.15); }
.competitor-card.rank-2 { border-color: var(--silver); }
.competitor-card.rank-3 { border-color: var(--bronze); }

.rank-badge {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  font-family: var(--font-mono);
  flex-shrink: 0;
  background: var(--bg-input);
  color: var(--text-secondary);
  border: 2px solid var(--border);
}

.rank-1 .rank-badge { background: linear-gradient(135deg, #FDE68A, #F59E0B); color: #78350F; border-color: var(--gold); }
.rank-2 .rank-badge { background: linear-gradient(135deg, #E2E8F0, #94A3B8); color: #334155; border-color: var(--silver); }
.rank-3 .rank-badge { background: linear-gradient(135deg, #FDE68A, #D97706); color: #78350F; border-color: var(--bronze); }

.competitor-info { flex: 1; min-width: 0; }

.card-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-subject {
  font-size: 13px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.competitor-meta {
  text-align: end;
  flex-shrink: 0;
}

.card-timer {
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text-primary);
  margin-bottom: 4px;
}

.card-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 10px;
  border-radius: 12px;
}

.card-status.studying { background: var(--success-light); color: var(--success); }
.card-status.break { background: var(--warning-light); color: var(--warning); }
.card-status.finished { background: var(--danger-light); color: var(--danger); }

.card-status .mini-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
}

.card-status.studying .mini-dot { background: var(--success); animation: pulse 1.5s infinite; }
.card-status.break .mini-dot { background: var(--warning); animation: pulse 1.5s infinite; }
.card-status.finished .mini-dot { background: var(--danger); }

/* ===== EMPTY / LOADING STATES ===== */
.empty-state, .loading-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}

.empty-icon, .loading-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.6;
}

.empty-state h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.empty-state p {
  font-size: 13px;
}

.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== CONNECTION TOAST ===== */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 10px 20px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  z-index: 1000;
  transition: transform 0.3s ease;
  box-shadow: var(--shadow-lg);
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); color: #FFF; }
.toast.error { background: var(--danger); color: #FFF; }
.toast.info { background: var(--accent); color: #FFF; }

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .hero-title { font-size: 22px; }
  .session-timer { font-size: 34px; }
  .stats-bar { gap: 8px; }
  .stat-pill { padding: 8px 12px; }
  .stat-value { font-size: 15px; }
  .competitor-card { padding: 12px; gap: 10px; }
}
</style>
</head>
<body data-theme="light">

<!-- TOP BAR -->
<div class="top-bar">
  <div class="date-display">
    <div class="hijri" id="hijriDate"></div>
    <div id="gregDate"></div>
  </div>
  <div class="top-actions">
    <button class="icon-btn" id="btnLang" title="Language" onclick="toggleLang()">EN</button>
    <button class="icon-btn" id="btnTheme" title="Theme" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1 class="hero-title" data-ar="ساحة المذاكرة" data-en="Study Arena"></h1>
  <p class="hero-motivational" data-ar="تنافس مع زملائك.. كل دقيقة تفرق!" data-en="Compete with peers — every minute counts!"></p>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-pill">
    <span class="stat-icon">📖</span>
    <div class="stat-info">
      <span class="stat-label" data-ar="يذاكرون الآن" data-en="Studying Now"></span>
      <span class="stat-value" id="statStudying">0</span>
    </div>
  </div>
  <div class="stat-pill">
    <span class="stat-icon">⏱️</span>
    <div class="stat-info">
      <span class="stat-label" data-ar="إجمالي اليوم" data-en="Today's Total"></span>
      <span class="stat-value" id="statTotal">00:00</span>
    </div>
  </div>
  <div class="stat-pill">
    <span class="stat-icon">👥</span>
    <div class="stat-info">
      <span class="stat-label" data-ar="المشاركون" data-en="Participants"></span>
      <span class="stat-value" id="statParticipants">0</span>
    </div>
  </div>
</div>

<!-- JOIN FORM -->
<div class="join-section" id="joinSection">
  <div class="join-card">
    <h2 data-ar="ابدأ جلسة مذاكرة" data-en="Start a Study Session"></h2>
    <div class="field-group">
      <label class="field-label" data-ar="اسمك" data-en="Your Name"></label>
      <input class="field-input" id="inputName" maxlength="30" data-placeholder-ar="مثال: حمدان" data-placeholder-en="e.g. Hamdan">
    </div>
    <div class="field-group">
      <label class="field-label" data-ar="إيش بتذاكر؟" data-en="What are you studying?"></label>
      <input class="field-input" id="inputSubject" maxlength="50" data-placeholder-ar="مثال: الرياضيات" data-placeholder-en="e.g. Mathematics">
    </div>
    <button class="btn-primary" id="btnStart" onclick="startSession()" data-ar="🚀 ابدأ المذاكرة" data-en="🚀 Start Studying"></button>
  </div>
</div>

<!-- MY SESSION PANEL -->
<div class="my-session" id="mySession">
  <div class="session-card">
    <div class="session-subject" id="mySubjectDisplay"></div>
    <div class="session-timer" id="myTimer">00:00:00</div>
    <div class="session-status status-studying" id="myStatusBadge">
      <span class="pulse-dot"></span>
      <span id="myStatusText" data-ar="يذاكر الآن" data-en="Studying"></span>
    </div>
    <div class="session-actions" id="sessionActions">
      <button class="btn-session btn-break" id="btnBreak" onclick="takeBreak()" data-ar="☕ بريك" data-en="☕ Break"></button>
      <button class="btn-session btn-finish" id="btnFinish" onclick="finishSession()" data-ar="✅ إنهاء" data-en="✅ Finish"></button>
    </div>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="leaderboard-section">
  <div class="leaderboard-header">
    <h2 class="leaderboard-title" data-ar="لوحة المنافسين" data-en="Leaderboard"></h2>
    <div class="sync-indicator">
      <span class="sync-dot" id="syncDot"></span>
      <span data-ar="متصل" data-en="Connected" id="syncText"></span>
    </div>
  </div>
  <div id="leaderboardContent">
    <div class="loading-state" id="loadingState">
      <div class="loading-spinner"></div>
      <p data-ar="جاري التحميل..." data-en="Loading..."></p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let currentTheme = localStorage.getItem('study_theme') || 'light';

const i18n = {

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function nowRiyadh() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Riyadh' }));
}

function toISOWithTZ() {
  return new Date().toISOString();
}

function formatDuration(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = Math.floor(totalSeconds % 60);
  if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatHM(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function calcLiveSeconds(session) {
  let total = session.total_study_seconds || 0;
  if (session.status === 'studying' && session.last_resumed_at) {
    const resumed = new Date(session.last_resumed_at).getTime();
    const now = Date.now();
    total += Math.max(0, Math.floor((now - resumed) / 1000));
  }
  return total;
}

function getTodayDate() {
  return nowRiyadh().toISOString().split('T')[0];
}

// =============================================
// HIJRI DATE
// =============================================
function updateDates() {
  const now = nowRiyadh();
  const gregOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Riyadh' };
  const gregStr = now.toLocaleDateString(currentLang === 'ar' ? 'ar-SA' : 'en-US', { ...gregOptions, calendar: 'gregory' });

  let hijriStr = '';
  try {
    hijriStr = now.toLocaleDateString(currentLang === 'ar' ? 'ar-SA' : 'en-US', {
      ...gregOptions,
      calendar: 'islamic-umalqura'
    });
  } catch(e) {
    hijriStr = now.toLocaleDateString('ar-SA', { ...gregOptions, calendar: 'islamic' });
  }

  document.getElementById('hijriDate').textContent = hijriStr;
  document.getElementById('gregDate').textContent = gregStr;
}

// =============================================
// THEME & LANGUAGE
// =============================================
function applyTheme() {
  document.body.setAttribute('data-theme', currentTheme);
  document.getElementById('btnTheme').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('study_theme', currentTheme);
}

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme();
}

function applyLang() {
  const isAr = currentLang === 'ar';
  document.documentElement.lang = currentLang;
  document.documentElement.dir = isAr ? 'rtl' : 'ltr';
  document.getElementById('btnLang').textContent = isAr ? 'EN' : 'عربي';
  localStorage.setItem('study_lang', currentLang);

  document.querySelectorAll('[data-ar]').forEach(el => {
    el.textContent = isAr ? el.dataset.ar : el.dataset.en;
  });
  document.querySelectorAll('[data-placeholder-ar]').forEach(el => {
    el.placeholder = isAr ? el.dataset.placeholderAr : el.dataset.placeholderEn;
  });

  updateDates();
  renderLeaderboard();
}

function toggleLang() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  applyLang();
}

// =============================================
// TOAST
// =============================================
function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// =============================================
// SESSION MANAGEMENT
// =============================================
async function startSession() {
  const name = document.getElementById('inputName').value.trim();
  const subject = document.getElementById('inputSubject').value.trim();

  if (!name || !subject) {
    showToast(t('fill_fields'), 'error');
    return;
  }

  if (!sessionUUID) {
    sessionUUID = generateUUID();
    localStorage.setItem('study_session_uuid', sessionUUID);
  }

  const now = toISOWithTZ();
  const { data, error } = await supabase.from(TABLE).insert({
    session_uuid: sessionUUID,
    name,
    subject,
    status: 'studying',
    started_at: now,
    last_resumed_at: now,
    total_study_seconds: 0,
    created_date: getTodayDate()
  }).select().single();

  if (error) {
    console.error('Insert error:', error);
    showToast('Error: ' + error.message, 'error');
    return;
  }

  mySessionId = data.id;
  localStorage.setItem('study_active_id', mySessionId);
  showMySession(data);
  showToast(t('session_started'), 'success');
}

async function takeBreak() {
  if (!mySessionId) return;
  const myData = sessions.find(s => s.id === mySessionId);
  if (!myData || myData.status !== 'studying') return;

  const liveSeconds = calcLiveSeconds(myData);

  const { error } = await supabase.from(TABLE).update({
    status: 'break',
    total_study_seconds: liveSeconds,
    last_resumed_at: null
  }).eq('id', mySessionId);

  if (!error) showToast(t('break_started'), 'info');
}

async function resumeStudy() {
  if (!mySessionId) return;

  const { error } = await supabase.from(TABLE).update({
    status: 'studying',
    last_resumed_at: toISOWithTZ()
  }).eq('id', mySessionId);

  if (!error) showToast(t('session_resumed'), 'success');
}

async function finishSession() {
  if (!mySessionId) return;
  const myData = sessions.find(s => s.id === mySessionId);
  if (!myData) return;

  const liveSeconds = calcLiveSeconds(myData);

  const { error } = await supabase.from(TABLE).update({
    status: 'finished',
    total_study_seconds: liveSeconds,
    last_resumed_at: null
  }).eq('id', mySessionId);

  if (!error) {
    localStorage.removeItem('study_active_id');
    mySessionId = null;
    document.getElementById('mySession').style.display = 'none';
    document.getElementById('joinSection').style.display = 'block';
    showToast(t('session_ended'), 'success');
  }
}

function showMySession(data) {
  document.getElementById('joinSection').style.display = 'none';
  document.getElementById('mySession').style.display = 'block';
  document.getElementById('mySubjectDisplay').textContent = data.subject;
  updateMySessionUI(data);
}

function updateMySessionUI(data) {
  if (!data) return;
  const badge = document.getElementById('myStatusBadge');
  const text = document.getElementById('myStatusText');
  const actions = document.getElementById('sessionActions');

  badge.className = 'session-status';
  if (data.status === 'studying') {
    badge.classList.add('status-studying');
    text.textContent = t('studying_now');
    actions.innerHTML = `
      <button class="btn-session btn-break" onclick="takeBreak()" data-ar="☕ بريك" data-en="☕ Break">${currentLang === 'ar' ? '☕ بريك' : '☕ Break'}</button>
      <button class="btn-session btn-finish" onclick="finishSession()" data-ar="✅ إنهاء" data-en="✅ Finish">${currentLang === 'ar' ? '✅ إنهاء' : '✅ Finish'}</button>
    `;
  } else if (data.status === 'break') {
    badge.classList.add('status-break');
    text.textContent = t('on_break');
    actions.innerHTML = `
      <button class="btn-session btn-resume" onclick="resumeStudy()" data-ar="📖 أكمل" data-en="📖 Resume">${currentLang === 'ar' ? '📖 أكمل' : '📖 Resume'}</button>
      <button class="btn-session btn-finish" onclick="finishSession()" data-ar="✅ إنهاء" data-en="✅ Finish">${currentLang === 'ar' ? '✅ إنهاء' : '✅ Finish'}</button>
    `;
  }
}

// =============================================
// TIMER TICKS
// =============================================
function startTimerLoop() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    // Update my timer
    if (mySessionId) {
      const myData = sessions.find(s => s.id === mySessionId);
      if (myData) {
        const secs = calcLiveSeconds(myData);
        document.getElementById('myTimer').textContent = formatDuration(secs);
      }
    }
    // Update leaderboard timers
    document.querySelectorAll('.competitor-card').forEach(card => {
      const sid = card.dataset.sessionId;
      const session = sessions.find(s => s.id === sid);
      if (session) {
        const timerEl = card.querySelector('.card-timer');
        if (timerEl) timerEl.textContent = formatDuration(calcLiveSeconds(session));
      }
    });
    // Update stats
    updateStats();
  }, 1000);
}

// =============================================
// STATS
// =============================================
function updateStats() {
  const active = sessions.filter(s => s.status === 'studying');
  const allSessions = sessions;
  let totalSeconds = 0;
  allSessions.forEach(s => { totalSeconds += calcLiveSeconds(s); });

  document.getElementById('statStudying').textContent = active.length;
  document.getElementById('statTotal').textContent = formatHM(totalSeconds);
  document.getElementById('statParticipants').textContent = allSessions.length;
}

// =============================================
// LEADERBOARD RENDER
// =============================================
function renderLeaderboard() {
  const container = document.getElementById('leaderboardContent');
  document.getElementById('loadingState')?.remove();

  // Sort: studying first, then break, then finished. Within each group: by total seconds desc
  const statusOrder = { studying: 0, break: 1, finished: 2 };
  const sorted = [...sessions].sort((a, b) => {
    const sa = statusOrder[a.status] ?? 3;
    const sb = statusOrder[b.status] ?? 3;
    if (sa !== sb) return sa - sb;
    return calcLiveSeconds(b) - calcLiveSeconds(a);
  });

  if (sorted.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <h3>${currentLang === 'ar' ? 'لا يوجد أحد بعد' : 'No one here yet'}</h3>
        <p>${currentLang === 'ar' ? 'كن أول من يبدأ المذاكرة!' : 'Be the first to start studying!'}</p>
      </div>
    `;
    return;
  }

  let html = '<div class="competitor-list">';
  sorted.forEach((s, i) => {
    const rank = i + 1;
    const isMe = s.id === mySessionId;
    const secs = calcLiveSeconds(s);
    const statusKey = s.status === 'studying' ? 'studying_now' : s.status === 'break' ? 'on_break' : 'finished';
    const statusClass = s.status === 'studying' ? 'studying' : s.status === 'break' ? 'break' : 'finished';

    let rankClass = '';
    if (rank === 1) rankClass = 'rank-1';
    else if (rank === 2) rankClass = 'rank-2';
    else if (rank === 3) rankClass = 'rank-3';

    const rankEmoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;

    html += `
      <div class="competitor-card ${rankClass} ${isMe ? 'is-me' : ''}" data-session-id="${s.id}">
        <div class="rank-badge">${rankEmoji}</div>
        <div class="competitor-info">
          <div class="card-name">${escapeHtml(s.name)}</div>
          <div class="card-subject">${escapeHtml(s.subject)}</div>
        </div>
        <div class="competitor-meta">
          <div class="card-timer">${formatDuration(secs)}</div>
          <div class="card-status ${statusClass}">
            <span class="mini-dot"></span>
            ${t(statusKey)}
          </div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  container.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// =============================================
// SUPABASE REALTIME
// =============================================
async function loadTodaySessions() {
  const today = getTodayDate();
  const { data, error } = await supabase
    .from(TABLE)
    .select('*')
    .eq('created_date', today)
    .order('started_at', { ascending: true });

  if (error) {
    console.error('Load error:', error);
    return;
  }

  sessions = data || [];
  renderLeaderboard();
  updateStats();

  // Check if we have an active session
  if (mySessionId) {
    const myData = sessions.find(s => s.id === mySessionId);
    if (myData && myData.status !== 'finished') {
      showMySession(myData);
    } else {
      localStorage.removeItem('study_active_id');
      mySessionId = null;
    }
  }
}

function subscribeRealtime() {
  const today = getTodayDate();

  supabase.channel('study-arena')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: TABLE,
      filter: `created_date=eq.${today}`
    }, (payload) => {
      const { eventType, new: newRec, old: oldRec } = payload;

      if (eventType === 'INSERT') {
        const exists = sessions.find(s => s.id === newRec.id);
        if (!exists) sessions.push(newRec);
      } else if (eventType === 'UPDATE') {
        const idx = sessions.findIndex(s => s.id === newRec.id);
        if (idx >= 0) sessions[idx] = newRec;
        else sessions.push(newRec);

        // Update my session UI if it's mine
        if (newRec.id === mySessionId) {
          updateMySessionUI(newRec);
          if (newRec.status === 'finished') {
            localStorage.removeItem('study_active_id');
            mySessionId = null;
            document.getElementById('mySession').style.display = 'none';
            document.getElementById('joinSection').style.display = 'block';
          }
        }
      } else if (eventType === 'DELETE') {
        sessions = sessions.filter(s => s.id !== (oldRec?.id || newRec?.id));
      }

      renderLeaderboard();
      updateStats();
    })
    .subscribe((status) => {
      const dot = document.getElementById('syncDot');
      const text = document.getElementById('syncText');
      if (status === 'SUBSCRIBED') {
        connected = true;
        dot.classList.remove('disconnected');
        text.textContent = currentLang === 'ar' ? 'متصل' : 'Connected';
      } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
        connected = false;
        dot.classList.add('disconnected');
        text.textContent = currentLang === 'ar' ? 'غير متصل' : 'Disconnected';
        showToast(t('disconnected'), 'error');
      }
    });
}

// =============================================
// CLEANUP OLD SESSIONS (auto-expire after 12h)
// =============================================
async function cleanupStaleSessions() {
  const cutoff = new Date(Date.now() - 12 * 60 * 60 * 1000).toISOString();
  await supabase.from(TABLE)
    .update({ status: 'finished', last_resumed_at: null })
    .lt('started_at', cutoff)
    .neq('status', 'finished');
}

// =============================================
// INIT
// =============================================
async function init() {
  // Apply saved preferences
  applyTheme();
  applyLang();

  // Generate session UUID if needed
  if (!sessionUUID) {
    sessionUUID = generateUUID();
    localStorage.setItem('study_session_uuid', sessionUUID);
  }

  // Load data and subscribe
  await loadTodaySessions();
  subscribeRealtime();
  startTimerLoop();
  cleanupStaleSessions();

  // Refresh dates every minute
  setInterval(updateDates, 60000);
}

init();
</script>
